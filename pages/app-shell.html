<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>GP Link</title>
  <script src="../js/updates-sync.js?v=20260309c" defer></script>
  <script src="../js/qualification-camera.js?v=20260310a" defer></script>
  <script src="../js/qualification-scan.js?v=20260331c" defer></script>
  <script src="../js/account-dropdown.js?v=20260323a" defer></script>
  <script src="../js/app-shell.js?v=20260424c" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4fa;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --blue2: #1d4ed8;
      --shadow-soft: 0 18px 40px -28px rgba(15, 23, 42, 0.5);
      --glass-bg: rgba(255, 255, 255, 0.58);
      --glass-border: rgba(191, 220, 255, 0.95);
      --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85), 0 10px 16px -14px rgba(37, 99, 235, 0.45);
      --radius-lg: 20px;
      --app-shell-top-offset: 0px;
      --app-shell-frame-top: 0px;
      --app-shell-bottom-offset: 0px;
      --app-shell-nav-clearance: 0px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(880px 520px at 10% -10%, rgba(10, 132, 255, 0.12), transparent 56%),
        radial-gradient(760px 460px at 100% 0%, rgba(29, 78, 216, 0.12), transparent 58%),
        var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .app-shell-desktop {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1200;
      padding: 0 24px;
      pointer-events: none;
    }

    .app-shell-desktop-inner {
      pointer-events: auto;
    }

    .topbar {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.55);
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .topbar-row {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 14px;
      min-height: 56px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .brand-logo img {
      display: block;
      width: 178px;
      height: auto;
    }

    .nav-menu {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px;
      border-radius: 14px;
    }

    .nav-item {
      position: relative;
      z-index: 2;
      transition: color .18s ease, font-weight .18s ease;
    }

    .nav-dropdown {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: stretch;
    }

    .nav-link,
    .account-pill {
      min-width: 92px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #111827;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.15;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-dropdown-trigger {
      position: relative;
      z-index: 2;
    }

    .nav-link.active,
    .account-pill.active {
      color: #0f172a;
      font-weight: 700;
    }

    .nav-icon {
      width: 17px;
      height: 17px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      color: #334155;
    }

    .nav-icon-wrap {
      position: relative;
      display: inline-grid;
      place-items: center;
      line-height: 1;
    }

    .nav-alert,
    .mobile-tab-alert {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 900;
      color: #ffffff;
      background: #dc2626;
      box-shadow: 0 6px 12px -10px rgba(220, 38, 38, 0.95);
      pointer-events: none;
      z-index: 2;
    }

    .nav-glass {
      position: absolute;
      top: 0;
      left: 0;
      width: 96px;
      height: 44px;
      opacity: 0;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      transition: left .34s cubic-bezier(.22,.9,.18,1.05), top .34s cubic-bezier(.22,.9,.18,1.05), width .34s cubic-bezier(.22,.9,.18,1.05), height .34s cubic-bezier(.22,.9,.18,1.05), opacity .18s ease;
      z-index: 1;
    }

    .nav-glass.engulf {
      background: rgba(37, 99, 235, 0.1);
    }

    .reg-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      width: min(540px, 78vw);
      padding: 14px;
      border-radius: 18px;
      border: 1px solid #e8edf5;
      background: #ffffff;
      box-shadow: 0 20px 40px -16px rgba(15, 23, 42, 0.18);
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
      transform: translate(-50%, 6px);
      transform-origin: top center;
      transition:
        opacity .16s ease,
        transform .16s ease,
        visibility .16s ease;
      z-index: 20;
    }

    .nav-dropdown.is-open .reg-dropdown {
      opacity: 1;
      pointer-events: auto;
      visibility: visible;
      transform: translate(-50%, 0);
    }

    .reg-head {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 800;
    }

    .reg-table {
      display: grid;
      gap: 8px;
    }

    .reg-row {
      position: relative;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      overflow: hidden;
      padding: 10px 12px;
      border: 1px solid #e8edf5;
      border-radius: 14px;
      background: #fafbfd;
    }

    .reg-name {
      font-size: 13px;
      font-weight: 700;
    }

    .reg-sub {
      margin-top: 2px;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
    }

    .reg-row.done {
      border-color: #bfdbfe;
      background: #eff6ff;
    }

    .reg-row.done .reg-name {
      color: #1d4ed8;
    }

    .reg-row.done .reg-sub {
      color: #64748b;
    }

    .reg-btn {
      padding: 8px 14px;
      border: 1px solid #bfdbfe;
      border-radius: 10px;
      background: #eff6ff;
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      text-decoration: none;
      transition: all .15s ease;
    }

    .reg-btn:hover {
      background: #dbeafe;
    }

    .reg-btn.done {
      border-color: #bfdbfe;
      background: #dbeafe;
      color: #1d4ed8;
    }

    .reg-btn.locked {
      border-color: #e2e8f0;
      background: #f1f5f9;
      color: #64748b;
    }

    .reg-row.locked-row {
      opacity: 0.7;
    }

    .reg-row.locked-row .reg-name {
      color: #94a3b8;
    }

    .reg-locked-hint {
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
      font-style: italic;
      margin-top: 2px;
    }

    .app-shell-frame-stack {
      position: fixed;
      left: 0;
      right: 0;
      top: var(--app-shell-frame-top);
      bottom: 0;
      width: 100%;
      height: calc(100dvh - var(--app-shell-frame-top));
      overflow: hidden;
      z-index: 1;
    }

    .app-shell-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #f0f4fa;
      opacity: 0;
      pointer-events: none;
      transition: opacity .16s ease;
      z-index: 1;
    }

    .app-shell-frame.is-active {
      opacity: 1;
      pointer-events: auto;
      z-index: 2;
    }

    .app-shell-loader {
      position: fixed;
      inset: var(--app-shell-frame-top) 0 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(240, 244, 250, 0.82), rgba(240, 244, 250, 0.94));
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .01em;
      z-index: 3;
    }

    .app-shell-loading .app-shell-loader {
      display: grid;
    }

    .app-shell-loader[hidden] {
      display: none;
    }

    .mobile-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      display: none;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      overflow: hidden;
      isolation: isolate;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(18px) saturate(1.25);
      -webkit-backdrop-filter: blur(18px) saturate(1.25);
      box-shadow: 0 -8px 26px -22px rgba(15, 23, 42, 0.42);
      z-index: 1200;
    }

    .mobile-reg-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease;
      z-index: 1240;
    }

    .mobile-reg-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .mobile-reg-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 74vh;
      overflow: auto;
      padding: 8px 12px calc(14px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid #e2e8f0;
      border-radius: 20px 20px 0 0;
      background: #ffffff;
      box-shadow: 0 -16px 40px -20px rgba(15, 23, 42, 0.3);
      opacity: 0;
      transform: translate3d(0, calc(100% + 18px), 0);
      transition: transform .32s cubic-bezier(.22,.9,.18,1.05), opacity .22s ease;
      touch-action: pan-y;
      will-change: transform, opacity;
      z-index: 1241;
    }

    .mobile-reg-sheet.show {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    .mobile-reg-grab {
      width: 40px;
      height: 4px;
      margin: 4px auto 10px;
      border-radius: 999px;
      background: #d1d5db;
    }

    .mobile-reg-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .mobile-reg-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
    }

    .mobile-reg-close {
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 50%;
      background: #f1f5f9;
      color: #475569;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .mobile-reg-table {
      display: grid;
      gap: 6px;
    }

    .mobile-reg-table .reg-row {
      grid-template-columns: 1fr auto;
    }

    .mobile-reg-table .reg-btn,
    .mobile-step-body .reg-btn {
      grid-column: 1 / -1;
      width: 100%;
      margin-top: 0;
      padding: 7px 12px;
      font-size: 11px;
      text-align: center;
    }

    .mobile-step-card {
      overflow: hidden;
      border: 1px solid #e8edf5;
      border-radius: 12px;
      background: #ffffff;
    }

    .mobile-step-head {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      font: inherit;
      cursor: pointer;
    }

    .mobile-step-title {
      font-size: 13px;
      font-weight: 700;
    }

    .mobile-step-caret {
      color: #94a3b8;
      font-size: 12px;
      font-weight: 800;
      transition: transform .2s ease;
    }

    .mobile-step-card.open .mobile-step-caret {
      transform: rotate(180deg);
    }

    .mobile-step-body {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid #e8edf5;
    }

    .mobile-step-copy {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.35;
      color: #334155;
    }

    .mobile-step-status {
      font-size: 12px;
      font-weight: 500;
      color: #334155;
    }

    .mobile-nav-glass {
      position: absolute;
      top: 10px;
      left: 14px;
      width: 0;
      height: 0;
      opacity: 0;
      border-radius: 16px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      transition:
        left .34s cubic-bezier(.22,.9,.18,1.05),
        top .34s cubic-bezier(.22,.9,.18,1.05),
        width .34s cubic-bezier(.22,.9,.18,1.05),
        height .34s cubic-bezier(.22,.9,.18,1.05),
        opacity .18s ease;
      z-index: 1;
    }

    .mobile-tab {
      position: relative;
      z-index: 2;
      border: 0;
      background: transparent;
      color: #475569;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-height: 62px;
      border-radius: 16px;
      text-decoration: none;
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      padding: 6px 4px;
      line-height: 1.1;
      cursor: pointer;
      transition: color .2s ease, transform .2s ease;
    }

    .mobile-tab-icon {
      position: relative;
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 12px;
      color: currentColor;
      transition: color .2s ease, transform .24s ease;
    }

    .mobile-tab-icon svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mobile-tab-label {
      display: none;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .01em;
      white-space: nowrap;
    }

    .mobile-tab-active {
      color: #0f172a;
      transform: translateY(-1px);
    }

    .mobile-tab-active .mobile-tab-icon {
      color: #145bc4;
      transform: translateY(-1px);
    }

    .mobile-tab-active .mobile-tab-label {
      display: block;
    }

    .mobile-tab-scan {
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      width: 58px;
      min-width: 58px;
      height: 58px;
      min-height: 58px;
      padding: 0;
      gap: 0;
      border-radius: 999px;
      justify-self: center;
      align-self: center;
      box-shadow: 0 16px 26px -18px rgba(37, 99, 235, 0.88);
      animation: scanPulse 1.9s ease-out infinite;
    }

    .mobile-tab-scan .mobile-tab-icon {
      width: 58px;
      height: 58px;
      border-radius: inherit;
      color: #ffffff;
    }

    .mobile-tab-scan .mobile-tab-icon svg {
      width: 22px;
      height: 22px;
    }

    .mobile-tab-scan .mobile-tab-label {
      display: none !important;
    }

    @keyframes scanPulse {
      0% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(37, 99, 235, 0.34),
          0 16px 26px -18px rgba(37, 99, 235, 0.88);
      }
      65% {
        transform: scale(1.04);
        box-shadow:
          0 0 0 14px rgba(37, 99, 235, 0),
          0 18px 30px -18px rgba(37, 99, 235, 0.92);
      }
      100% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(37, 99, 235, 0),
          0 16px 26px -18px rgba(37, 99, 235, 0.88);
      }
    }

    @media (max-width: 859px) {
      .app-shell-desktop {
        display: none;
      }

      .mobile-nav {
        display: grid;
      }
    }

    @media (min-width: 860px) {
      .mobile-nav {
        display: none !important;
      }
    }
  </style>
</head>

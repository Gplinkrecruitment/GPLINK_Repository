<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VA Command Centre - GP Link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#f4f6fb;--panel:#fff;--line:#dfe6f2;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--green:#16a34a;--amber:#b45309;--red:#dc2626;--purple-1:#7c3aed;--purple-2:#6366f1;--radius:12px;--shadow:0 1px 3px rgba(15,23,42,.08)}
    *{box-sizing:border-box;margin:0}
    body{font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--text);background:var(--bg);height:100vh;overflow:hidden}
    .top-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 20px;background:linear-gradient(120deg,var(--purple-1),var(--purple-2));color:#fff;flex-wrap:wrap}
    .top-bar h1{font-size:17px;font-weight:760;letter-spacing:-.02em}
    .top-bar-left{display:flex;align-items:center;gap:14px}
    .top-chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.24);color:#fff}
    .chip b{font-weight:900;font-size:12px}
    .chip.urgent{background:rgba(239,68,68,.35);border-color:rgba(239,68,68,.5)}
    .top-right{display:flex;align-items:center;gap:10px}
    .top-meta{font-size:11px;opacity:.8}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--text);cursor:pointer;font-family:inherit;transition:all .12s}
    .btn:hover{background:#f8fafc;border-color:#cbd5e1}
    .btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn.primary:hover{background:#1d4ed8}
    .btn.sm{padding:5px 10px;font-size:11px}
    .btn.ghost{background:transparent;border:0;color:#fff;opacity:.85}
    .btn.ghost:hover{opacity:1}
    .btn.red{color:var(--red);border-color:#fecaca}
    .btn.green{color:var(--green);border-color:#bbf7d0}
    .btn.amber{color:var(--amber);border-color:#fde68a}
    .layout{display:grid;grid-template-columns:340px 1fr;height:calc(100vh - 48px);overflow:hidden}
    @media(max-width:900px){.layout{grid-template-columns:1fr}.detail-panel{display:none}.layout.detail-open .list-panel{display:none}.layout.detail-open .detail-panel{display:flex}}
    .list-panel{display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--panel);overflow:hidden}
    .list-header{padding:12px 14px;border-bottom:1px solid var(--line)}
    .search-input{width:100%;padding:8px 12px;border-radius:10px;border:1px solid var(--line);font-size:13px;font-family:inherit;outline:none;background:#f8fafc}
    .search-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
    .view-tabs{display:flex;border-bottom:1px solid var(--line)}
    .view-tab{flex:1;padding:8px 0;text-align:center;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .view-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
    .view-tab:hover{color:var(--text)}
    .filter-bar{display:flex;gap:4px;padding:8px 14px;overflow-x:auto;flex-wrap:nowrap}
    .filter-btn{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;white-space:nowrap}
    .filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
    .filter-btn .fc{margin-left:3px;opacity:.7}
    .case-list{flex:1;overflow-y:auto;padding:6px}
    .case-card{padding:10px 12px;border-radius:var(--radius);border:1px solid transparent;cursor:pointer;transition:all .12s;margin-bottom:2px}
    .case-card:hover{background:#f8fafc;border-color:var(--line)}
    .case-card.selected{background:#eff6ff;border-color:#bfdbfe}
    .case-card-top{display:flex;align-items:center;gap:10px}
    .case-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple-1));display:grid;place-items:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0}
    .case-card-info{flex:1;min-width:0}
    .case-card-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .case-card-sub{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
    .case-stage-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
    .stage-myintealth{background:#eff6ff;color:#1d4ed8}.stage-amc{background:#faf5ff;color:#7c3aed}.stage-career{background:#fefce8;color:#a16207}.stage-ahpra{background:#ecfdf5;color:#166534}.stage-visa{background:#fff1f2;color:#be123c}.stage-pbs{background:#f0fdfa;color:#0d9488}.stage-commencement{background:#fdf4ff;color:#a21caf}.stage-complete{background:#f0fdf4;color:#16a34a}
    .case-card-tasks{display:flex;gap:6px;margin-top:6px}
    .task-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:5px}
    .task-badge.urgent{background:#fef2f2;color:#dc2626}.task-badge.open{background:#eff6ff;color:#2563eb}.task-badge.overdue{background:#fffbeb;color:#b45309}
    .detail-panel{display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
    .detail-scroll{flex:1;overflow-y:auto;padding:16px 20px 80px}
    .detail-empty{display:grid;place-items:center;height:100%;color:var(--muted);font-size:14px;font-weight:600;text-align:center;padding:40px}
    .mobile-back{display:none;margin-bottom:10px}
    @media(max-width:900px){.mobile-back{display:block}}
    .d-header{background:var(--panel);border-radius:var(--radius);border:1px solid var(--line);padding:16px;margin-bottom:12px}
    .d-header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .d-name{font-size:18px;font-weight:800;letter-spacing:-.02em}
    .d-meta{font-size:12px;color:var(--muted);font-weight:500;margin-top:2px;display:flex;flex-wrap:wrap;gap:8px}
    .d-meta span{white-space:nowrap}
    .d-progress{margin-top:10px;display:flex;align-items:center;gap:10px}
    .d-progress-bar{flex:1;height:5px;border-radius:99px;background:#e8edf5;overflow:hidden}
    .d-progress-bar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple-1));transition:width .4s}
    .d-progress-label{font-size:11px;font-weight:800;color:var(--muted)}
    .d-actions{display:flex;gap:6px;flex-wrap:wrap}
    .section{background:var(--panel);border-radius:var(--radius);border:1px solid var(--line);padding:14px;margin-bottom:12px}
    .section-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
    .section-title .cnt{font-size:11px;font-weight:700;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:6px}
    .next-action{background:linear-gradient(135deg,#1e293b,#0f172a);color:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px}
    .next-action-kicker{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.6);margin-bottom:4px}
    .next-action-label{font-size:15px;font-weight:800;margin-bottom:2px}
    .next-action-detail{font-size:12px;color:rgba(255,255,255,.7);font-weight:500;margin-bottom:10px}
    .next-action .btn.primary{background:var(--blue);border-color:var(--blue)}
    .task-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
    .task-row:last-child{border-bottom:0}
    .tp{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
    .tp.urgent{background:var(--red)}.tp.high{background:var(--amber)}.tp.normal{background:var(--blue)}.tp.low{background:#94a3b8}
    .task-body{flex:1;min-width:0}
    .task-title{font-size:13px;font-weight:700}
    .task-desc{font-size:11px;color:var(--muted);font-weight:500;margin-top:1px}
    .task-actions{display:flex;gap:4px;margin-top:4px}
    .task-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;background:#f1f5f9;color:var(--muted)}
    .task-tag.stage{background:#eff6ff;color:#1d4ed8}
    .journey-stepper{display:grid;gap:0}
    .j-step{display:flex;gap:12px;padding:10px 0}
    .j-step-track{display:flex;flex-direction:column;align-items:center;gap:0;width:28px;flex-shrink:0}
    .j-dot{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;border:2px solid var(--line);color:var(--muted);background:#fff;flex-shrink:0}
    .j-dot.done{background:var(--green);color:#fff;border-color:var(--green)}.j-dot.current{background:var(--blue);color:#fff;border-color:var(--blue)}.j-dot.locked{opacity:.4}
    .j-line{width:2px;flex:1;min-height:8px;background:var(--line)}.j-line.done{background:var(--green)}
    .j-body{flex:1;min-width:0;padding-bottom:4px}
    .j-label{font-size:13px;font-weight:700}
    .j-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px}
    .j-badge.done{background:#ecfdf5;color:#166534}.j-badge.current{background:#eff6ff;color:#1d4ed8}.j-badge.locked{background:#f1f5f9;color:#94a3b8}.j-badge.pending{background:#f8fafc;color:#64748b}
    .j-subs{margin-top:6px;display:grid;gap:3px}
    .j-sub{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:500;color:var(--muted)}
    .j-sub-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#cbd5e1}
    .j-sub-dot.done{background:var(--green)}.j-sub-dot.current{background:var(--blue)}
    .j-playbook{margin-top:6px;font-size:11px;color:var(--muted);background:#f8fafc;border-radius:8px;padding:8px 10px;line-height:1.5}
    .j-playbook strong{color:var(--text);font-weight:700}
    .case-mgmt{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:600px){.case-mgmt{grid-template-columns:1fr}}
    .case-field{display:grid;gap:3px}
    .case-field label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
    .case-field select,.case-field input,.case-field textarea{padding:7px 10px;border-radius:8px;border:1px solid var(--line);font-size:12px;font-family:inherit;background:#fff}
    .case-field select:focus,.case-field input:focus,.case-field textarea:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.06)}
    .tl-item{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f1f5f9;font-size:12px}
    .tl-item:last-child{border-bottom:0}
    .tl-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0;margin-top:4px}
    .tl-dot.note{background:var(--amber)}.tl-dot.system{background:#94a3b8}.tl-dot.completed{background:var(--green)}
    .tl-body{flex:1;min-width:0}
    .tl-title{font-weight:700;color:var(--text)}
    .tl-detail{color:var(--muted);margin-top:1px}
    .tl-time{color:var(--muted);font-size:11px;white-space:nowrap;flex-shrink:0}
    .wq-header h2{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
    .wq-header p{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:14px}
    .wq-section-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin:12px 0 6px;display:flex;align-items:center;gap:6px}
    .wq-count{font-size:11px;font-weight:800;padding:1px 7px;border-radius:6px}
    .wq-count.red{background:#fef2f2;color:#dc2626}.wq-count.amber{background:#fffbeb;color:#b45309}.wq-count.blue{background:#eff6ff;color:#2563eb}
    .wq-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--line);background:var(--panel);margin-bottom:6px;cursor:pointer;transition:all .12s}
    .wq-item:hover{border-color:#bfdbfe;background:#fafbff}
    .wq-gp{font-size:11px;font-weight:700;color:var(--blue)}
    .wq-label{font-size:13px;font-weight:700}
    .wq-detail{font-size:11px;color:var(--muted);margin-top:1px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;place-items:center}
    .modal-overlay.open{display:grid}
    .modal{background:#fff;border-radius:16px;padding:20px;max-width:520px;width:90vw;max-height:80vh;overflow-y:auto;box-shadow:0 20px 50px -12px rgba(0,0,0,.3)}
    .modal h3{font-size:16px;font-weight:800;margin-bottom:12px}
    .textarea{width:100%;min-height:60px;padding:10px;border-radius:10px;border:1px solid var(--line);font-size:13px;font-family:inherit;resize:vertical;margin:8px 0}
    .textarea:focus{border-color:var(--blue);outline:none}
    .empty{text-align:center;padding:30px;color:var(--muted);font-size:13px;font-weight:600}
    .ticket-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
    .ticket-row:last-child{border-bottom:0}
    .ticket-info{flex:1;min-width:0}
    .ticket-title{font-size:13px;font-weight:700}
    .ticket-meta{font-size:11px;color:var(--muted)}
    .status-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
    .status-pill.open{background:#eff6ff;color:#1d4ed8}.status-pill.closed{background:#f1f5f9;color:#64748b}
    .case-card-vis{display:flex;gap:3px;margin-top:4px}
    .jdot-sm{width:6px;height:6px;border-radius:50%;background:#cbd5e1}
    .jdot-sm.done{background:var(--green)}.jdot-sm.current{background:var(--blue)}

    /* ══ Ops Queue Tab ══ */
    .ops-panel{display:none;flex-direction:column;height:calc(100vh - 48px);overflow:hidden;background:var(--bg)}
    .ops-panel.active{display:flex}
    .ops-stats{display:flex;gap:10px;padding:14px 20px 0;flex-wrap:wrap}
    .ops-stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:10px 16px;flex:1;min-width:120px}
    .ops-stat-val{font-size:22px;font-weight:900;letter-spacing:-.02em}
    .ops-stat-val.red{color:var(--red)}.ops-stat-val.amber{color:var(--amber)}.ops-stat-val.blue{color:var(--blue)}
    .ops-stat-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);margin-top:2px}
    .ops-filters{display:flex;gap:8px;padding:12px 20px;flex-wrap:wrap;align-items:center}
    .ops-filters select{padding:6px 10px;border-radius:8px;border:1px solid var(--line);font-size:12px;font-family:inherit;background:#fff;cursor:pointer}
    .ops-filters select:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.06)}
    .ops-filters label.ops-cb{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
    .ops-filters label.ops-cb input{accent-color:var(--red)}
    .ops-table-wrap{flex:1;overflow:auto;padding:0 20px 20px}
    .ops-table{width:100%;border-collapse:collapse;font-size:12px}
    .ops-table thead{position:sticky;top:0;z-index:2}
    .ops-table th{background:#f1f5f9;padding:8px 10px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap}
    .ops-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top}
    .ops-table tr.ops-row{cursor:pointer;transition:background .1s}
    .ops-table tr.ops-row:hover{background:#f8fafc}
    .ops-table tr.ops-row.overdue{background:#fef2f2}
    .ops-table tr.ops-row.overdue:hover{background:#fee2e2}
    .ops-table tr.ops-row.selected{background:#eff6ff}
    .ops-domain-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.02em}
    .ops-domain-badge.registration{background:#ecfdf5;color:#166534}
    .ops-domain-badge.visa{background:#eff6ff;color:#1d4ed8}
    .ops-domain-badge.questionnaire{background:#faf5ff;color:#7c3aed}
    .ops-domain-badge.sponsor{background:#fffbeb;color:#a16207}
    .ops-domain-badge.document{background:#f1f5f9;color:#64748b}
    .ops-domain-badge.system{background:#fef2f2;color:#dc2626}
    .ops-status-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800}
    .ops-status-pill.open{background:#eff6ff;color:#1d4ed8}
    .ops-status-pill.in_progress{background:#fffbeb;color:#b45309}
    .ops-status-pill.waiting_on_gp{background:#fffbeb;color:#b45309}
    .ops-status-pill.waiting_on_practice{background:#fffbeb;color:#b45309}
    .ops-status-pill.waiting_on_external{background:#fffbeb;color:#b45309}
    .ops-status-pill.blocked{background:#fef2f2;color:#dc2626}
    .ops-status-pill.completed{background:#ecfdf5;color:#166534}
    .ops-status-pill.cancelled{background:#f1f5f9;color:#64748b}
    .ops-pri-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800}
    .ops-pri-pill.urgent{background:#fef2f2;color:#dc2626}
    .ops-pri-pill.high{background:#fffbeb;color:#b45309}
    .ops-pri-pill.normal{background:#eff6ff;color:#1d4ed8}
    .ops-pri-pill.low{background:#f1f5f9;color:#64748b}
    .ops-detail-row td{padding:0;background:#f8fafc;border-bottom:1px solid var(--line)}
    .ops-detail-inner{padding:16px 20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .ops-detail-inner .case-field{display:grid;gap:3px}
    .ops-detail-inner .case-field label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;color:var(--muted)}
    .ops-detail-inner .case-field select,.ops-detail-inner .case-field input{padding:7px 10px;border-radius:8px;border:1px solid var(--line);font-size:12px;font-family:inherit;background:#fff}
    .ops-detail-inner .case-field select:focus,.ops-detail-inner .case-field input:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.06)}
    .ops-detail-info{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid var(--line);margin-bottom:4px}
    .ops-detail-info-item{font-size:11px;color:var(--muted)}
    .ops-detail-info-item strong{display:block;font-size:12px;color:var(--text);font-weight:700;margin-bottom:1px}
    .ops-detail-actions{grid-column:1/-1;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .ops-note-area{grid-column:1/-1;display:flex;gap:8px;align-items:flex-start}
    .ops-note-area textarea{flex:1;min-height:36px;padding:8px 10px;border-radius:8px;border:1px solid var(--line);font-size:12px;font-family:inherit;resize:vertical}
    .ops-note-area textarea:focus{border-color:var(--blue);outline:none;box-shadow:0 0 0 3px rgba(37,99,235,.06)}
    .ops-gp-name{font-weight:700;font-size:12px;color:var(--blue);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
    .ops-task-title{font-weight:700;font-size:12px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .ops-due{font-size:11px;white-space:nowrap}
    .ops-due.overdue{color:var(--red);font-weight:700}
    .ops-created{font-size:11px;color:var(--muted);white-space:nowrap}
    @media(max-width:900px){
      .ops-stats{gap:6px;padding:10px 12px 0}
      .ops-stat{padding:8px 10px;min-width:80px}
      .ops-stat-val{font-size:18px}
      .ops-filters{padding:10px 12px;gap:6px}
      .ops-table-wrap{padding:0 12px 12px}
      .ops-table .hide-mobile{display:none}
      .ops-detail-inner{grid-template-columns:1fr}
      .ops-detail-info{grid-template-columns:1fr 1fr}
    }
    .agent-stack{display:grid;gap:12px}
    .agent-hero{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;border-radius:16px;padding:18px;border:1px solid rgba(255,255,255,.08)}
    .agent-hero h2{font-size:22px;font-weight:850;letter-spacing:-.03em;margin-bottom:4px}
    .agent-hero p{font-size:13px;color:rgba(255,255,255,.72);line-height:1.5}
    .agent-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}

    /* ══ VA Dashboard rebuild — Today, Tickets, Quals, WhatsApp, Nudges ══ */

.top-search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;max-height:480px;overflow-y:auto;background:var(--bg2,#171a22);border:1px solid var(--border,#2a2f3a);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:500}
.top-search-group{padding:6px 0;border-bottom:1px solid var(--border,#2a2f3a)}
.top-search-group:last-child{border-bottom:none}
.top-search-group-title{padding:6px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted,#9aa3b2)}
.top-search-row{padding:8px 12px;cursor:pointer;display:flex;gap:8px;align-items:center}
.top-search-row:hover,.top-search-row.active{background:var(--bg3,#1f2330)}
.top-search-row-main{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-search-row-sub{font-size:12px;color:var(--muted,#9aa3b2);flex-shrink:0}
.top-search-more{padding:6px 12px;font-size:12px;color:var(--accent,#4f46e5);cursor:pointer;text-align:center}
.top-search-footer{padding:6px 12px;font-size:11px;color:var(--muted,#9aa3b2);border-top:1px solid var(--border,#2a2f3a)}
.top-search-empty{padding:16px;text-align:center;color:var(--muted,#9aa3b2);font-size:13px}
.tools-wrap{padding:16px 20px}
.tools-subnav{display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--border,#2a2f3a);padding-bottom:12px}
.tools-subnav-btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted,#9aa3b2);background:transparent;border:1px solid transparent}
.tools-subnav-btn:hover{background:var(--bg3,#1f2330);color:var(--text,#e6e9f0)}
.tools-subnav-btn.active{background:var(--accent,#4f46e5);color:#fff}
.tools-sub-pane{min-height:400px}
.gp-detail-grid{display:grid;grid-template-columns:260px 1fr;gap:20px;height:100%}
.gp-detail-meta{padding:16px;border-right:1px solid var(--border,#2a2f3a);overflow-y:auto}
.gp-detail-tabs-wrap{padding:16px;overflow-y:auto}
.gp-detail-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border,#2a2f3a)}
.gp-detail-tab{padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted,#9aa3b2);border-bottom:2px solid transparent}
.gp-detail-tab:hover{color:var(--text,#e6e9f0)}
.gp-detail-tab.active{color:var(--accent,#4f46e5);border-bottom-color:var(--accent,#4f46e5)}
body.gp-mobile .gp-detail-grid{grid-template-columns:1fr;height:auto}
body.gp-mobile .gp-detail-meta{border-right:none;border-bottom:1px solid var(--border,#2a2f3a)}
body.gp-mobile .gp-detail-tabs{display:none}
body.gp-mobile .gp-detail-tab-pane{display:block !important;margin-bottom:16px}
body.gp-mobile .gp-detail-meta [data-gp-back]{display:inline-block !important}
body.gp-mobile #mainLayout.detail-open .list-panel{display:none}
body.gp-mobile #mainLayout.detail-open .detail-panel{display:block}
.inbox-section-title{margin:20px 0 8px;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted,#9aa3b2);display:flex;align-items:center;gap:8px}
.inbox-section-title .count{padding:2px 8px;border-radius:999px;background:var(--bg3,#1f2330);font-size:11px}
.inbox-section-title .count.red{background:var(--red,#ef4444);color:#fff}
.inbox-section-title .count.amber{background:var(--amber,#f59e0b);color:#fff}
.blocker-row{padding:12px;border:1px solid var(--border,#2a2f3a);border-radius:8px;background:var(--bg2,#171a22);margin-bottom:8px;display:flex;align-items:center;gap:12px}
.blocker-row-main{flex:1;min-width:0}
.blocker-row-name{font-weight:700}
.blocker-row-reason{font-size:12px;color:var(--muted,#9aa3b2);margin-top:2px}

</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <h1 id="topTitle">VA Command Centre</h1>
      <div class="top-chips" id="topChips"></div>
    </div>
    <div class="top-search">
        <input type="search" id="globalSearch" placeholder="Search GPs, tasks, tickets, documents, notes…" autocomplete="off" spellcheck="false" />
        <div class="top-search-results" id="globalSearchResults" style="display:none"></div>
      </div>
    <div class="top-right">
      <span class="top-meta" id="topMeta"></span>
      <button class="btn ghost" id="syncBtn" title="Sync cases">Sync</button>
      <button class="btn ghost" id="logoutBtn">Logout</button>
    </div>
  </div>
  <div class="layout" id="mainLayout">
    <div class="list-panel">
      <div class="list-header"><input class="search-input" id="searchInput" placeholder="Search GPs..." /></div>
      <div class="view-tabs">
        <div class="view-tab active" data-view="inbox">Inbox</div>
        <div class="view-tab" data-view="gps">GPs</div>
        <div class="view-tab" data-view="interviews">Interviews</div>
        <div class="view-tab" data-view="applications">Applications</div>
        <div class="view-tab" data-view="tools">Tools</div>
      </div>
      <div class="filter-bar" id="filterBar"></div>
      <div class="case-list" id="caseList"></div>
    </div>
    <div class="detail-panel">
      <div class="detail-scroll" id="detailContent">
        <div class="detail-empty">Select a case from the list, or use the Work Queue tab.</div>
      </div>
    </div>
  </div>
  <div class="today-wrap" id="inboxPanel" style="display:none"></div>
  <div class="interviews-wrap" id="interviewsPanel" style="display:none"></div>
  <div class="applications-wrap" id="applicationsPanel" style="display:none"></div>
  <div class="tools-wrap" id="toolsPanel" style="display:none">
    <div class="tools-subnav" id="toolsSubnav"></div>
    <div class="tools-sub-pane" id="toolsOps" style="display:none">
      <div class="ops-stats" id="opsStats"></div>
      <div class="ops-filters" id="opsFilters">
        <select id="opsDomain">
          <option value="">All Domains</option>
          <option value="registration">Registration</option>
          <option value="visa">Visa</option>
          <option value="questionnaire">Questionnaire</option>
          <option value="sponsor">Sponsor</option>
          <option value="document">Document</option>
          <option value="system">System</option>
        </select>
        <select id="opsStatus">
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="waiting_on_gp">Waiting on GP</option>
          <option value="waiting_on_practice">Waiting on Practice</option>
          <option value="waiting_on_external">Waiting on External</option>
          <option value="blocked">Blocked</option>
          <option value="all_active">All Active</option>
          <option value="completed">Completed</option>
        </select>
        <select id="opsPriority">
          <option value="">All Priorities</option>
          <option value="urgent">Urgent</option>
          <option value="high">High</option>
          <option value="normal">Normal</option>
          <option value="low">Low</option>
        </select>
        <label class="ops-cb"><input type="checkbox" id="opsOverdue" /> Overdue only</label>
        <button class="btn sm" id="opsSlaBtn">Run SLA Check</button>
        <button class="btn sm primary" id="opsRefreshBtn">Refresh</button>
      </div>
      <div class="ops-table-wrap">
        <table class="ops-table">
          <thead>
            <tr>
              <th>GP Name</th>
              <th>Title</th>
              <th>Domain</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Due Date</th>
              <th class="hide-mobile">Stage</th>
              <th class="hide-mobile">Created</th>
            </tr>
          </thead>
          <tbody id="opsTableBody"></tbody>
        </table>
      </div>
    </div>
    <div class="tools-sub-pane" id="toolsSweep" style="display:none"></div>
    <div class="tools-sub-pane" id="toolsAgent" style="display:none"></div>
  </div>
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3 id="modalTitle"></h3>
      <div id="modalBody"></div>
    </div>
  </div>
<script>
(function(){
  "use strict";
  const S={dashboard:null,cases:[],tasks:[],visaCases:[],pbsCases:[],viewer:null,hostLabel:"",loading:false,
    selectedCaseId:null,view:"inbox",filter:"all",query:"",expanded:{},refreshTimer:null,
    opsTasks:[],opsExpandedId:null,opsLoading:false,
    toolsSubView:"ops",gpsProfileTab:"tasks",
    va:{dashboard:null,tickets:[],ticketsView:"open",selectedQuals:null,loading:false,gpDetailCache:{},lastSweepResult:null},
    interviews:{list:[],loading:false},
    applications:{list:[],loading:false},
    search:{query:"",loading:false,clientResults:{gps:[],tasks:[],tickets:[]},serverResults:{documents:[],notes:[]},open:false,debounceTimer:null},
    agent:{providers:null,runs:[],workers:[],primaryWorkerId:"",policy:null,connectCommands:null,activeRunId:"",selectedRunId:null,currentRun:null,
      draftTask:"",profile:"balanced",collaborationMode:"paired",complexity:"auto",loading:false,submitting:false,
      warnings:[],security:null,providerStatusRefreshedAt:"",error:"",
      bridge:{connected:false,mode:"remote",baseUrl:"",error:"",status:null,candidates:["http://127.0.0.1:4317","http://localhost:4317"]}}};
  const STEPS=[
    {key:"myintealth",label:"MyIntealth",num:1},
    {key:"amc",label:"AMC Portfolio",num:2},
    {key:"career",label:"Career & Documents",num:3},
    {key:"ahpra",label:"AHPRA Registration",num:4},
    {key:"visa",label:"Visa Application",num:5},
    {key:"pbs",label:"PBS & Medicare",num:6},
    {key:"commencement",label:"Commencement",num:7}
  ];
  const PLAYBOOK={
    myintealth:{gp:"Create MyIntealth account, complete onboarding, upload qualification certificates.",va:"Verify uploaded documents match GP credentials. Approve verification or request re-upload if rejected."},
    amc:{gp:"Create AMC account, upload credentials and portfolio documents.",va:"Confirm AMC account created. Help GP gather required credentials. Check qualifications are accepted."},
    career:{gp:"Browse jobs, apply to positions, complete document preparation checklist.",va:"Match GP with suitable positions. Ensure all documents prepared. Confirm placement is secured."},
    ahpra:{gp:"Complete AHPRA registration form, submit documents, respond to assessment queries.",va:"Guide through AHPRA stages. Ensure submission is complete. Monitor assessment. Escalate if stuck."},
    visa:{gp:"Upload required visa documents, respond to document requests from VA.",va:"Create visa case in admin-visa. Review documents. Request missing items. Track visa progress."},
    pbs:{gp:"Upload Medicare/PBS documents, provide practice details when requested.",va:"Create PBS case in admin-pbs. Apply for Medicare Provider Number and PBS Prescriber Number."},
    commencement:{gp:"Complete pre-arrival checklist, confirm arrival date.",va:"Prepare welcome pack. Coordinate with practice. Confirm all registrations complete."}
  };
  function esc(s){const d=document.createElement("div");d.textContent=s||"";return d.innerHTML;}
  function safeUrl(u,fallback){if(!u||typeof u!=="string")return fallback||"#";var t=u.trim().toLowerCase();if(t.startsWith("https://")||t.startsWith("http://")||t.startsWith("whatsapp://"))return esc(u.trim());return fallback||"#";}
  function ticketCard(tk){
    return`<div class="todo-card ${esc(tk.priority)||"normal"}" data-todo-ticket="${esc(tk.id)}" data-user-id="${esc(tk.user_id)}">
      <div class="todo-card-top">
        <div class="todo-avatar">${esc(ini(tk.gp_name||""))}</div>
        <div class="todo-gp">${esc(tk.gp_name||"")}</div>
        <span class="todo-stage">${esc(tk.stage||"ticket")}</span>
      </div>
      <div class="todo-title">🎫 ${esc(tk.title||"Support request")}</div>
      ${(tk.gp_phone||tk.gp_email)?'<div class="task-gp-meta">'+(tk.gp_phone?'<span>'+esc(tk.gp_phone)+'</span>':'')+(tk.gp_email?'<span>'+esc(tk.gp_email)+'</span>':'')+'</div>':''}
      <div class="todo-detail">${esc(tk.category||"")} • opened ${fmtR(tk.created_at)}</div>
      <div class="todo-actions">
        <a class="btn wa" href="${safeUrl(tk.whatsapp_link)}" target="_blank" rel="noopener">WhatsApp</a>
        <button class="btn nudge" data-nudge-user="${esc(tk.user_id)}" data-nudge-stage="${esc(tk.stage||"")}" data-nudge-substage="${esc(tk.substage||"")}" data-nudge-name="${esc(tk.gp_first_name||"")}">Send Nudge</button>
        <button class="btn primary sm" data-close-ticket="${esc(tk.id)}">Resolve & Close</button>
      </div>
    </div>`;
  }
  function taskCard(t){
    const overdue=t.is_overdue||(t.due_date&&new Date(t.due_date)<new Date());
    return`<div class="todo-card ${esc(t.priority||"normal")} ${overdue?"overdue":""}" data-todo-task="${esc(t.id)}" data-todo-case="${esc(t.case_id)}" data-user-id="${esc(t.gp_user_id||"")}">
      <div class="todo-card-top">
        <div class="todo-avatar">${esc(ini(t.gp_name||""))}</div>
        <div class="todo-gp">${esc(t.gp_name||"")}</div>
        <span class="todo-stage">${esc(t.case_stage||t.related_stage||"")}</span>
      </div>
      <div class="todo-title">${esc(t.title)}</div>
      ${(t.gp_phone||t.gp_email)?'<div class="task-gp-meta">'+(t.gp_phone?'<span>'+esc(t.gp_phone)+'</span>':'')+(t.gp_email?'<span>'+esc(t.gp_email)+'</span>':'')+'</div>':''}
      <div class="todo-detail">${esc(t.description||"")} ${t.due_date?" • Due "+fmtD(t.due_date):""} ${overdue?'<span style="color:var(--red);font-weight:800"> • OVERDUE</span>':""}</div>
      <div class="todo-actions">
        <a class="btn wa" href="${safeUrl(t.whatsapp_link)}" target="_blank" rel="noopener">WhatsApp</a>
        ${t.doubletick_conversation_url?'<a class="btn dt" href="'+safeUrl(t.doubletick_conversation_url)+'" target="_blank" rel="noopener">💬 DoubleTick</a>':''}
        <button class="btn nudge" data-nudge-user="${esc(t.gp_user_id||"")}" data-nudge-stage="${esc(t.case_stage||t.related_stage||"")}" data-nudge-substage="${esc(t.related_substage||"")}" data-nudge-name="${esc(t.gp_first_name||"")}">Send Nudge</button>
        <button class="btn primary sm" data-complete-todo-task="${esc(t.id)}">Complete</button>
        <button class="btn sm" data-view-todo-case="${esc(t.case_id)}">Open Case</button>
      </div>
    </div>`;
  }
  function blockerRow(u){
    return`<div class="blocker-row" data-blocker-case="${esc(u.case_id)}">
      <div class="todo-avatar">${esc(ini(u.gp_name||""))}</div>
      <div class="blocker-row-main">
        <div class="blocker-row-name">${esc(u.gp_name||"")} <span class="todo-stage">${esc(u.stage||"")}</span></div>
        <div class="blocker-row-reason">${esc(u.blocker_status||"Blocked")}</div>
      </div>
      <button class="btn sm primary" data-view-todo-case="${esc(u.case_id)}">Open profile</button>
    </div>`;
  }
  function ini(n){return(n||"?").split(" ").map(w=>w[0]||"").join("").substring(0,2).toUpperCase();}
  function fmtD(d){if(!d)return"\u2014";try{return new Date(d).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"});}catch{return"\u2014";}}
  function fmtDT(d){if(!d)return"\u2014";try{return new Date(d).toLocaleString("en-AU",{day:"numeric",month:"short",hour:"numeric",minute:"2-digit"});}catch{return"\u2014";}}
  function fmtR(d){if(!d)return"never";const ms=Date.now()-new Date(d).getTime();if(ms<60000)return"just now";if(ms<3600000)return Math.floor(ms/60000)+"m ago";if(ms<86400000)return Math.floor(ms/3600000)+"h ago";return Math.floor(ms/86400000)+"d ago";}
  function daysAgo(d){if(!d)return 999;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
  function shortTask(text,max){text=String(text||"").trim();return text.length>(max||110)?text.slice(0,(max||110)-1)+"\u2026":text;}
  function agentStatusClass(status){status=String(status||"").toLowerCase();if(status==="completed"||status==="connected"||status==="ready")return"ok";if(status==="running"||status==="starting"||status==="launching"||status==="cancelling")return"warn";return"err";}
  function prettyRole(role){return String(role||"").replace(/_/g," ").replace(/\b\w/g,m=>m.toUpperCase());}
  function agentConnectCommands(){return Object.assign({openai:"codex login",anthropic:"claude auth login",localBridge:"/usr/local/Cellar/node@18/18.20.8/bin/node scripts/agent-bridge.js"},S.agent.connectCommands||{});}
  function agentBridgeActive(){return !!(S.agent.bridge&&S.agent.bridge.connected&&S.agent.bridge.mode==="local"&&S.agent.bridge.baseUrl);}
  async function fetchJson(url,opts){const r=await fetch(url,opts);const d=await r.json().catch(()=>({}));return{r,d};}
  function applyAgentStatusPayload(d,mode,baseUrl){
    S.agent.providers=d.providers||null;
    S.agent.policy=d.dashboard&&d.dashboard.policy?d.dashboard.policy:null;
    S.agent.runs=d.dashboard&&Array.isArray(d.dashboard.runs)?d.dashboard.runs:[];
    S.agent.workers=d.dashboard&&Array.isArray(d.dashboard.workers)?d.dashboard.workers:[];
    S.agent.primaryWorkerId=d.dashboard&&d.dashboard.primaryWorkerId?d.dashboard.primaryWorkerId:"";
    S.agent.activeRunId=d.dashboard&&d.dashboard.activeRunId?d.dashboard.activeRunId:"";
    S.agent.connectCommands=Object.assign(agentConnectCommands(),d.connectCommands||{});
    S.agent.warnings=d.dashboard&&Array.isArray(d.dashboard.warnings)?d.dashboard.warnings:[];
    S.agent.security=d.dashboard&&d.dashboard.security?d.dashboard.security:null;
    S.agent.providerStatusRefreshedAt=d.dashboard&&d.dashboard.providerStatusRefreshedAt?d.dashboard.providerStatusRefreshedAt:"";
    S.agent.error="";
    const bridgePayload=d.bridge&&typeof d.bridge==="object"?d.bridge:null;
    if(mode==="local"){
      S.agent.bridge.connected=true;
      S.agent.bridge.mode="local";
      S.agent.bridge.baseUrl=baseUrl||"";
      S.agent.bridge.status=bridgePayload||null;
      S.agent.bridge.error="";
    }else if(bridgePayload&&bridgePayload.connected){
      S.agent.bridge.connected=true;
      S.agent.bridge.mode=bridgePayload.mode||"relay";
      S.agent.bridge.baseUrl=bridgePayload.baseUrl||bridgePayload.relayUrl||"";
      S.agent.bridge.status=bridgePayload;
      S.agent.bridge.error="";
    }else{
      S.agent.bridge.connected=false;
      S.agent.bridge.mode="remote";
      S.agent.bridge.baseUrl="";
      S.agent.bridge.status=bridgePayload||null;
    }
    if(!S.agent.selectedRunId||!S.agent.runs.find(run=>run.runId===S.agent.selectedRunId)){
      S.agent.selectedRunId=S.agent.activeRunId||(S.agent.runs[0]&&S.agent.runs[0].runId)||null;
    }
  }
  async function tryLocalAgentBridge(path,opts){
    const candidates=Array.isArray(S.agent.bridge.candidates)?S.agent.bridge.candidates:[];
    let lastError="";
    for(const baseUrl of candidates){
      try{
        const init=Object.assign({mode:"cors",credentials:"omit"},opts||{});
        const res=await fetchJson(baseUrl+path,init);
        if(res.r.ok&&res.d&&res.d.ok){
          S.agent.bridge.connected=true;
          S.agent.bridge.mode="local";
          S.agent.bridge.baseUrl=baseUrl;
          S.agent.bridge.status=res.d.bridge||{connected:true,mode:"local-bridge",baseUrl};
          S.agent.bridge.error="";
          return{baseUrl,...res};
        }
        lastError=res.d&&res.d.message?res.d.message:("Bridge request failed ("+res.r.status+")");
      }catch(err){
        lastError=err&&err.message?err.message:"Local bridge unavailable.";
      }
    }
    S.agent.bridge.connected=false;
    S.agent.bridge.error=lastError||"Local bridge unavailable.";
    return null;
  }
  async function agentApi(path,init){
    if(agentBridgeActive()){
      const opts=Object.assign({mode:"cors",credentials:"omit"},init||{});
      return fetchJson(S.agent.bridge.baseUrl+path,opts);
    }
    const opts=Object.assign({credentials:"same-origin"},init||{});
    return fetchJson(path,opts);
  }

  /* ══ Auth ══ */
  async function loadSession(){
    try{const r=await fetch("/api/admin/auth/session",{credentials:"same-origin"});const d=await r.json().catch(()=>({}));
    if(!d.authenticated){window.location.href="/pages/admin-signin.html";return false;}
    const profile=d.profile||d.session||{};
    const adminRole=profile.adminRole||profile.role||"";
    S.viewer=Object.assign({},profile,{role:adminRole,roleLabel:adminRole==="super_admin"?"Super Admin":"Admin"});
    S.hostLabel=d.hostLabel||"Admin";return true;}catch{return false;}
  }
  function isSA(){return S.viewer&&(S.viewer.role==="super_admin"||S.viewer.adminRole==="super_admin");}

  /* ══ Data Loading ══ */
  async function loadDash(){try{const r=await fetch("/api/admin/dashboard",{credentials:"same-origin"});if(r.status===401){window.location.href="/pages/admin-signin.html";return;}const d=await r.json().catch(()=>({}));if(r.ok)S.dashboard=d;}catch{}}
  async function loadCases(){try{const r=await fetch("/api/admin/cases",{credentials:"same-origin"});const d=await r.json().catch(()=>({}));if(d.ok&&Array.isArray(d.cases))S.cases=d.cases;}catch{}}
  async function loadTasks(){try{const r=await fetch("/api/admin/tasks?status=open,in_progress,waiting",{credentials:"same-origin"});const d=await r.json().catch(()=>({}));if(d.ok&&Array.isArray(d.tasks))S.tasks=d.tasks;}catch{}}
  async function loadVisa(){try{const r=await fetch("/api/admin/visa/cases",{credentials:"same-origin"});const d=await r.json().catch(()=>({}));if(d.ok&&Array.isArray(d.cases))S.visaCases=d.cases;}catch{}}
  async function loadPbs(){try{const r=await fetch("/api/admin/pbs/cases",{credentials:"same-origin"});const d=await r.json().catch(()=>({}));if(d.ok&&Array.isArray(d.cases))S.pbsCases=d.cases;}catch{}}
  async function loadAgentStatus(force){
    if(!isSA())return;
    if(S.agent.loading&&!force)return;
    S.agent.loading=true;
    S.agent.connectCommands=agentConnectCommands();
    try{
      const params=new URLSearchParams();
      if(S.agent.draftTask)params.set("task",S.agent.draftTask);
      params.set("profile",S.agent.profile);
      params.set("collaborationMode",S.agent.collaborationMode);
      params.set("complexity",S.agent.complexity);
      if(force)params.set("refresh","true");
      const taskParam=params.toString()?("?"+params.toString()):"";
      const local=await tryLocalAgentBridge("/api/admin/agent-control/status"+taskParam);
      if(local&&local.d&&local.d.ok){
        applyAgentStatusPayload(local.d,"local",local.baseUrl);
      }else{

        }else{

          S.agent.error=(remote.d&&remote.d.message?remote.d.message:"Unable to load agent status.")+localMsg;

  function findCase(gp){const uid=gp.userId||"",e=(gp.email||"").toLowerCase();return S.cases.find(c=>(uid&&c.user_id===uid)||(e&&(c.gp_email||"").toLowerCase()===e))||null;}
  function findGp(rc){const uid=rc.user_id||"",e=(rc.gp_email||"").toLowerCase();return gps().find(g=>(uid&&g.userId===uid)||(e&&(g.email||"").toLowerCase()===e))||null;}
  function findVisa(rc){const uid=rc.user_id||"",e=(rc.gp_email||"").toLowerCase();return S.visaCases.find(c=>(uid&&c.user_id===uid)||(e&&(c.gp_email||"").toLowerCase()===e))||null;}

  function buildJourney(gp){
    const pw=Array.isArray(gp.pathwaySteps)?gp.pathwaySteps:[];
    const ms=s=>!s?"pending":s.status==="done"?"done":s.status==="current"?"current":"pending";
    const msub=s=>!s||!Array.isArray(s.substeps)?[]:s.substeps.map(x=>({label:x.label||x.key||"",status:x.status==="done"?"done":x.status==="current"?"current":"pending"}));
    const s1=ms(pw.find(s=>s.id==="myintealth")),s2=ms(pw.find(s=>s.id==="amc")),s3=ms(pw.find(s=>s.id==="documents")),s4=ms(pw.find(s=>s.id==="ahpra"));
    return[
      {...STEPS[0],status:s1,substeps:msub(pw.find(s=>s.id==="myintealth"))},
      {...STEPS[1],status:s2,substeps:msub(pw.find(s=>s.id==="amc"))},
      {...STEPS[2],status:s3,substeps:msub(pw.find(s=>s.id==="documents"))},
      {...STEPS[3],status:s4,substeps:msub(pw.find(s=>s.id==="ahpra"))},
      {...STEPS[4],status:"pending",substeps:[]},
      {...STEPS[5],status:"pending",substeps:[]},
      {...STEPS[6],status:"pending",substeps:[]}
    ];
  }

  /* ══ Merged Case+GP List ══ */
  function mergedCases(){
    // Merge registration_cases with dashboard candidates
    const caseMap=new Map();
    S.cases.forEach(c=>{caseMap.set(c.user_id||c.gp_email,c);});
    // Also include candidates without cases
    const merged=[];
    const seen=new Set();
    S.cases.forEach(rc=>{
      const gp=findGp(rc);
      merged.push({rc,gp:gp||null,sort_stage:STEPS.findIndex(s=>s.key===rc.stage),sort_urgent:rc.urgent_tasks||0,sort_open:rc.open_tasks||0});
      seen.add(rc.user_id);
      if(gp)seen.add(gp.email);
    });
    gps().forEach(gp=>{
      if(seen.has(gp.userId)||seen.has(gp.email))return;
      merged.push({rc:null,gp,sort_stage:99,sort_urgent:0,sort_open:0});
    });
    return merged;
  }

  function filteredCases(){
    let list=mergedCases();
    const q=S.query.trim().toLowerCase();
    if(q)list=list.filter(m=>{
      const name=(m.rc?m.rc.gp_name:m.gp?m.gp.name:"")||"";
      const email=(m.rc?m.rc.gp_email:m.gp?m.gp.email:"")||"";
      return(name+" "+email).toLowerCase().includes(q);
    });
    if(S.filter==="urgent")list=list.filter(m=>m.rc&&m.rc.urgent_tasks>0);
    else if(S.filter==="overdue")list=list.filter(m=>m.rc&&m.rc.overdue_tasks>0);
    else if(S.filter==="blocked")list=list.filter(m=>m.rc&&m.rc.blocker_status);
    else if(S.filter==="active")list=list.filter(m=>!m.rc||m.rc.status==="active");
    else if(S.filter==="complete")list=list.filter(m=>m.rc&&m.rc.status==="complete");
    list.sort((a,b)=>{
      const au=a.rc?a.rc.urgent_tasks||0:0,bu=b.rc?b.rc.urgent_tasks||0:0;
      if(au!==bu)return bu-au;
      const ao=a.rc?a.rc.open_tasks||0:0,bo=b.rc?b.rc.open_tasks||0:0;
      if(ao!==bo)return bo-ao;
      return(a.sort_stage||99)-(b.sort_stage||99);
    });
    return list;
  }

  function counts(){
    const all=mergedCases();
    return{
      all:all.length,
      urgent:all.filter(m=>m.rc&&m.rc.urgent_tasks>0).length,
      overdue:all.filter(m=>m.rc&&m.rc.overdue_tasks>0).length,
      blocked:all.filter(m=>m.rc&&m.rc.blocker_status).length,
      active:all.filter(m=>!m.rc||m.rc.status==="active").length,
      complete:all.filter(m=>m.rc&&m.rc.status==="complete").length
    };
  }

            ${renderCaseManagementForm(c)}

        </div>

        <div class="gp-detail-tab ${tab==="tasks"?"active":""}" data-gp-tab="tasks">Tasks</div>
        <div class="gp-detail-tab ${tab==="documents"?"active":""}" data-gp-tab="documents">Documents</div>
        <div class="gp-detail-tab ${tab==="journey"?"active":""}" data-gp-tab="journey">Journey</div>

        <div class="gp-detail-tab-pane" data-gp-pane="documents" style="${tab==="documents"?"":"display:none"}">${renderGpDocumentsPane(c)}</div>

    if(!S.selectedCaseId){
      const tasks=S.tasks.slice().sort((a,b)=>{const p={urgent:0,high:1,normal:2,low:3};return(p[a.priority]||2)-(p[b.priority]||2);});
      const urgent=tasks.filter(t=>t.priority==="urgent"),high=tasks.filter(t=>t.priority==="high"),normal=tasks.filter(t=>t.priority!=="urgent"&&t.priority!=="high");

  async function loadCaseQualifications(userId){
    const el=document.getElementById("caseQualSection");if(!el)return;
    try{
      const r=await fetch("/api/admin/va/user-qualifications?user_id="+encodeURIComponent(userId),{credentials:"same-origin"});
      const d=await r.json().catch(()=>({}));
      if(!d||!d.ok||!d.snapshot){el.innerHTML=`<div class="empty">Unable to load qualifications.</div>`;return;}
      const snap=d.snapshot;
      const approved=Array.isArray(snap.approved)?snap.approved:[];
      const pending=Array.isArray(snap.uploaded_unverified)?snap.uploaded_unverified:[];
      const missing=Array.isArray(snap.missing)?snap.missing:[];
      let h=`<div class="qual-section">
        <div class="qual-box"><h4>✓ Approved by AI (${approved.length})</h4>
          ${approved.length?approved.map(q=>`<span class="qual-chip approved"><span class="dot"></span>${esc(q.label)} <a href="${esc(q.download_url||"#")}" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;margin-left:4px">download</a></span>`).join(""):`<div class="todo-detail">None approved yet.</div>`}
        </div>
        <div class="qual-box"><h4>⧗ Uploaded — awaiting AI (${pending.length})</h4>
          ${pending.length?pending.map(q=>`<span class="qual-chip pending"><span class="dot"></span>${esc(q.label)}</span>`).join(""):`<div class="todo-detail">Nothing awaiting verification.</div>`}
        </div>
      </div>
      <div class="qual-box" style="margin-top:8px"><h4>⚠ VA still to submit (${missing.length})</h4>
        ${missing.length?missing.map(q=>`<span class="qual-chip missing"><span class="dot"></span>${esc(q.label)}</span>`).join(""):`<div class="todo-detail">All required qualifications accounted for. 🎉</div>`}
        <div class="todo-detail" style="margin-top:6px">Country: <b>${esc(snap.country||"GB")}</b></div>
      </div>`;
      el.innerHTML=h;
    }catch(err){el.innerHTML=`<div class="empty">Failed to load qualifications.</div>`;}
  }

  async function loadTimeline(caseId){
    const el=document.getElementById("timelineContent");if(!el)return;
    try{
      const r=await fetch("/api/admin/case?id="+encodeURIComponent(caseId),{credentials:"same-origin"});
      const d=await r.json().catch(()=>({}));
      if(!d.ok||!Array.isArray(d.timeline)){el.innerHTML=`<div class="empty">No timeline entries.</div>`;return;}
      if(!d.timeline.length){el.innerHTML=`<div class="empty">No timeline entries yet.</div>`;return;}
      el.innerHTML=d.timeline.map(e=>{
        const dotClass=e.event_type==="note"?"note":e.event_type==="completed"?"completed":"system";
        return`<div class="tl-item"><span class="tl-dot ${dotClass}"></span><div class="tl-body"><div class="tl-title">${esc(e.title)}</div>${e.detail?`<div class="tl-detail">${esc(e.detail)}</div>`:""}<div class="tl-detail">${esc(e.actor||"system")}</div></div><span class="tl-time">${fmtR(e.created_at)}</span></div>`;
      }).join("");
    }catch{el.innerHTML=`<div class="empty">Failed to load timeline.</div>`;}
  }

    const browserUse=data&&data.browserUse?data.browserUse:null;
    return `<div class="agent-card">
      <div class="agent-provider-head">
        <div>
          <div class="agent-provider-name">${esc(label)}</div>
          <div class="agent-meta">${esc(data&&data.authSummary?data.authSummary:(data&&data.reason?data.reason:"Status unavailable"))}</div>
        </div>
        <span class="agent-status ${agentStatusClass(available?"connected":"failed")}">${esc(statusText)}</span>
      </div>
      <div class="agent-kv">
        <div class="agent-kv-row">
          <div class="agent-kv-key">CLI</div>
          <div class="agent-kv-value">${esc(binaryName)}</div>
        </div>
        <div class="agent-kv-row">
          <div class="agent-kv-key">Auth</div>
          <div class="agent-kv-value">${esc(data&&data.authSummary?data.authSummary:(data&&data.reason?data.reason:"Unknown"))}</div>

        </div>`:""}

  function bridgeCard(){
    const bridge=S.agent.bridge||{};
    const connected=!!bridge.connected;
    const relay=bridge.status&&bridge.status.mode==="relay";
    const workerName=bridge.status&&bridge.status.workerName?bridge.status.workerName:"";
    const mode=connected?(relay?"Secure Relay Ready":"Local Bridge Ready"):"Local Bridge Offline";
    const detail=connected
      ?(relay?((workerName?workerName+" • ":"")+"Synced to the live dashboard via "+(bridge.status&&bridge.status.relayUrl?bridge.status.relayUrl:"secure relay")):(bridge.baseUrl||"Localhost bridge connected"))
      :(bridge.error||"Start the local bridge on this Mac so the live dashboard can use your local CLIs.");
    const targetLabel=connected?(relay?"This Mac via secure relay":"This Mac"):"Remote server only";
    const urlLabel=relay?(bridge.status&&bridge.status.relayUrl?bridge.status.relayUrl:"Relay connected"):((bridge.baseUrl)||((bridge.candidates&&bridge.candidates[0])||"http://127.0.0.1:4317"));
    const syncLabel=relay
      ?(bridge.status&&bridge.status.lastSeenAt?fmtDT(bridge.status.lastSeenAt):"Awaiting first relay sync")
      :(bridge.status&&bridge.status.relay&&bridge.status.relay.lastSyncAt?fmtDT(bridge.status.relay.lastSyncAt):"Direct localhost mode");
    return `<div class="agent-card">
      <div class="agent-provider-head">
        <div>
          <div class="agent-provider-name">Local Bridge</div>
          <div class="agent-meta">${esc(detail)}</div>
        </div>
        <span class="agent-status ${agentStatusClass(connected?"connected":"failed")}">${esc(mode)}</span>
      </div>
      <div class="agent-kv">
        <div class="agent-kv-row">
          <div class="agent-kv-key">Execution target</div>
          <div class="agent-kv-value">${esc(targetLabel)}</div>
        </div>
        <div class="agent-kv-row">
          <div class="agent-kv-key">Bridge URL</div>
          <div class="agent-kv-value">${esc(urlLabel)}</div>
        </div>
        <div class="agent-kv-row">
          <div class="agent-kv-key">Last sync</div>
          <div class="agent-kv-value">${esc(syncLabel)}</div>
        </div>
      </div>
      <div class="agent-toolbar">
        <button class="btn sm" data-agent-connect="localBridge">${connected?"Restart Help":"Start Bridge"}</button>
      </div>
    </div>`;
  }

  async function refreshAgentStatus(force){
    await loadAgentStatus(!!force);
    if(S.agent.selectedRunId)await loadAgentRun(S.agent.selectedRunId);

  async function startAgentRun(){
    const taskEl=document.getElementById("agentTaskInput");
    const profileEl=document.getElementById("agentProfileSelect");
    const collabEl=document.getElementById("agentCollabSelect");
    const complexityEl=document.getElementById("agentComplexitySelect");
    const task=taskEl?taskEl.value.trim():"";
    if(task.length<12){alert("Please give the agent a more specific task.");return;}
    S.agent.draftTask=task;
    S.agent.profile=profileEl?profileEl.value:S.agent.profile;
    S.agent.collaborationMode=collabEl?collabEl.value:S.agent.collaborationMode;
    S.agent.complexity=complexityEl?complexityEl.value:S.agent.complexity;
    try{
      const res=await agentApi("/api/admin/agent-control/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({task:S.agent.draftTask,profile:S.agent.profile,collaborationMode:S.agent.collaborationMode,complexity:S.agent.complexity})});
      const d=res.d||{};
      if(!res.r.ok||!d.ok){alert(d.message||"Failed to start run.");return;}
      S.agent.activeRunId=d.run&&d.run.runId?d.run.runId:"";
      S.agent.selectedRunId=S.agent.activeRunId||S.agent.selectedRunId;
      S.agent.warnings=d.warning?[d.warning]:S.agent.warnings;
      await refreshAgentStatus(true);
    }catch(err){alert(err&&err.message?err.message:"Failed to start run.");}
  }

  async function cancelAgentRun(runId){
    if(!runId)return;
    if(!window.confirm("Cancel the active agent run?"))return;
    try{
      const res=await agentApi("/api/admin/agent-control/run/cancel",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({runId})});
      const d=res.d||{};
      if(!res.r.ok||!d.ok){alert(d.message||"Unable to cancel the run.");return;}
      await refreshAgentStatus(true);
    }catch(err){alert(err&&err.message?err.message:"Unable to cancel the run.");}
  }

        <button class="btn primary" id="sendReplyBtn">Send Reply</button>

  /* ══ Ops Queue ══ */
  async function loadOpsQueue(){
    if(S.opsLoading)return;S.opsLoading=true;
    const domain=document.getElementById("opsDomain").value;
    const status=document.getElementById("opsStatus").value;
    const priority=document.getElementById("opsPriority").value;
    const overdue=document.getElementById("opsOverdue").checked;
    let url="/api/admin/ops/queue?limit=200";
    if(domain)url+="&domain="+encodeURIComponent(domain);
    if(status&&status!=="all_active")url+="&status="+encodeURIComponent(status);
    if(status==="all_active")url+="&status=open,in_progress,waiting_on_gp,waiting_on_practice,waiting_on_external,blocked";
    if(priority)url+="&priority="+encodeURIComponent(priority);
    if(overdue)url+="&overdue=true";
    try{
      const r=await fetch(url,{credentials:"same-origin"});
      const d=await r.json().catch(()=>({}));
      if(d.ok&&Array.isArray(d.tasks))S.opsTasks=d.tasks;
    }catch{}
    S.opsLoading=false;
    renderOpsStats();
    renderOpsTable();
  }

  function renderOpsStats(){
    const all=S.opsTasks;
    const now=new Date();
    const openC=all.filter(t=>t.status==="open").length;
    const urgentC=all.filter(t=>t.priority==="urgent").length;
    const overdueC=all.filter(t=>{if(!t.due_date&&!t.sla_due_date)return false;const d=new Date(t.sla_due_date||t.due_date);return d<now&&t.status!=="completed"&&t.status!=="cancelled";}).length;
    const waitGp=all.filter(t=>t.status==="waiting_on_gp").length;
    const waitPrac=all.filter(t=>t.status==="waiting_on_practice").length;
    document.getElementById("opsStats").innerHTML=
      `<div class="ops-stat"><div class="ops-stat-val blue">${openC}</div><div class="ops-stat-label">Open Tasks</div></div>`+
      `<div class="ops-stat"><div class="ops-stat-val red">${urgentC}</div><div class="ops-stat-label">Urgent</div></div>`+
      `<div class="ops-stat"><div class="ops-stat-val ${overdueC?"red":""}">${overdueC}</div><div class="ops-stat-label">Overdue</div></div>`+
      `<div class="ops-stat"><div class="ops-stat-val amber">${waitGp}</div><div class="ops-stat-label">Waiting on GP</div></div>`+
      `<div class="ops-stat"><div class="ops-stat-val amber">${waitPrac}</div><div class="ops-stat-label">Waiting on Practice</div></div>`;
  }

  function showOpsToast(msg,color){
    // Reuse existing showToast if available, otherwise create inline toast
    if(typeof showToast==="function"){showToast(msg);return;}
    const t=document.createElement("div");
    t.textContent=msg;
    t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:700;color:#fff;z-index:9999;animation:fadeout .4s 2.2s forwards;background:"+(color==="red"?"var(--red)":color==="amber"?"var(--amber)":"var(--green)");
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2800);
  }

  async function loadInterviews(){
    S.interviews.loading=true;
    renderInterviewsPanel();
    try{
      const r=await fetch("/api/admin/career/interviews",{credentials:"same-origin"});
      if(r.status===401){window.location.href="/pages/admin-signin.html";return;}
      const d=await r.json().catch(()=>({}));
      if(d&&d.ok&&Array.isArray(d.interviews)){S.interviews.list=d.interviews;}
    }catch{}
    S.interviews.loading=false;
    renderInterviewsPanel();
  }

  function fmtIvDate(iso){
    if(!iso)return"—";
    const d=new Date(iso);
    return d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short",year:"numeric"})+" at "+d.toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"});
  }
  function ivFormatClass(f){return(f||"").toLowerCase().replace(/\s+/g,"_");}
  function ivFormatLabel(f){
    const map={video:"Video",phone:"Phone",in_person:"In Person","video call":"Video","phone call":"Phone","in person":"In Person"};
    return map[(f||"").toLowerCase()]||f||"—";
  }

  function renderInterviewsPanel(){
    const el=document.getElementById("interviewsPanel");if(!el)return;
    if(S.interviews.loading){el.innerHTML='<div class="interviews-wrap"><div class="empty">Loading interviews...</div></div>';return;}
    const interviews=S.interviews.list.slice().sort((a,b)=>new Date(a.scheduled_at)-new Date(b.scheduled_at));
    const upcoming=interviews.filter(i=>i.status!=="cancelled"&&i.status!=="completed"&&i.status!=="no_show");
    const past=interviews.filter(i=>i.status==="cancelled"||i.status==="completed"||i.status==="no_show");

    let listHtml="";
    if(upcoming.length===0&&past.length===0){
      listHtml='<div class="empty">No interviews scheduled yet.</div>';
    }else{
      if(upcoming.length){
        listHtml+='<div class="today-group-title">Upcoming <span class="count">'+upcoming.length+'</span></div>';
        upcoming.forEach(iv=>{listHtml+=renderIvCard(iv);});
      }
      if(past.length){
        listHtml+='<div class="today-group-title" style="margin-top:18px">Past / Closed <span class="count">'+past.length+'</span></div>';
        past.forEach(iv=>{listHtml+=renderIvCard(iv);});
      }
    }

    el.innerHTML='<div class="interviews-wrap">'+
      '<div class="interviews-header"><div><h2>Interview Scheduler</h2><p style="font-size:12px;color:var(--muted);margin-top:2px">Manage GP interview scheduling</p></div>'+
      '<button class="btn sm primary" data-iv-refresh>Refresh</button></div>'+
      '<div class="interviews-grid">'+
        '<div>'+listHtml+'</div>'+
        '<div>'+renderIvForm()+'</div>'+
      '</div>'+
    '</div>';
  }

  function renderIvCard(iv){
    const gpName=iv.gp_name||iv.user_id||"Unknown GP";
    const fmtCls=ivFormatClass(iv.format);
    const isActive=iv.status==="scheduled"||iv.status==="confirmed";
    return '<div class="iv-card">'+
      '<div class="iv-card-top">'+
        '<div class="iv-card-gp">'+esc(gpName)+'</div>'+
        '<div style="display:flex;gap:6px;align-items:center">'+
          '<span class="iv-format-badge '+esc(fmtCls)+'">'+esc(ivFormatLabel(iv.format))+'</span>'+
          '<span class="iv-status-pill '+esc(iv.status||"")+'">'+esc((iv.status||"").replace(/_/g," "))+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="iv-card-time">'+fmtIvDate(iv.scheduled_at)+'</div>'+
      '<div class="iv-card-meta">'+
        '<span>Duration: '+(iv.duration||30)+' min</span>'+
        (iv.interviewer_name?'<span>Interviewer: '+esc(iv.interviewer_name)+'</span>':'')+
        (iv.timezone?'<span>'+esc(iv.timezone)+'</span>':'')+
      '</div>'+
      (iv.internal_notes?'<div style="font-size:11px;color:var(--muted);margin-top:6px;background:#f8fafc;padding:6px 8px;border-radius:6px">'+esc(iv.internal_notes)+'</div>':'')+
      (isActive?'<div class="iv-card-actions">'+
        '<button class="btn sm green" data-iv-complete="'+esc(iv.id)+'">Mark Complete</button>'+
        '<button class="btn sm red" data-iv-cancel="'+esc(iv.id)+'">Cancel</button>'+
      '</div>':'')+
    '</div>';
  }

  async function submitInterview(){
    const appId=(document.getElementById("ivAppId")||{}).value||"";
    const dateTime=(document.getElementById("ivDateTime")||{}).value||"";
    const duration=parseInt((document.getElementById("ivDuration")||{}).value||"30",10);
    const format=(document.getElementById("ivFormat")||{}).value||"video";
    const timezone=(document.getElementById("ivTimezone")||{}).value||"Australia/Sydney";
    const interviewerName=(document.getElementById("ivInterviewerName")||{}).value||"";
    const interviewerRole=(document.getElementById("ivInterviewerRole")||{}).value||"";
    const interviewerEmail=(document.getElementById("ivInterviewerEmail")||{}).value||"";
    const internalNotes=(document.getElementById("ivNotes")||{}).value||"";

    if(!appId.trim()){showOpsToast("Application ID is required","red");return;}
    if(!dateTime){showOpsToast("Date and time is required","red");return;}
    if(!interviewerName.trim()){showOpsToast("Interviewer name is required","red");return;}

    const scheduledAt=new Date(dateTime).toISOString();
    try{
      const r=await fetch("/api/admin/career/interview/schedule",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({applicationId:appId.trim(),scheduledAt:scheduledAt,duration:duration,timezone:timezone,format:format,interviewerName:interviewerName.trim(),interviewerRole:interviewerRole.trim(),interviewerEmail:interviewerEmail.trim(),internalNotes:internalNotes.trim()})});
      const d=await r.json().catch(()=>({}));
      if(d&&d.ok){showOpsToast("Interview scheduled");await loadInterviews();}
      else{showOpsToast((d&&d.message)||"Failed to schedule interview","red");}
    }catch{showOpsToast("Network error","red");}
  }

  async function updateInterviewStatus(id,status){
    try{
      const r=await fetch("/api/admin/career/interview",{method:"PATCH",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({id:id,status:status})});
      const d=await r.json().catch(()=>({}));
      if(d&&d.ok){showOpsToast(status==="completed"?"Interview marked complete":status==="cancelled"?"Interview cancelled":"Interview updated");await loadInterviews();}
      else{showOpsToast((d&&d.message)||"Failed to update interview","red");}
    }catch{showOpsToast("Network error","red");}
  }

  function renderInboxPanel(){
    const el=document.getElementById("inboxPanel");if(!el)return;
    const dash=S.va.dashboard;
    if(!dash){el.innerHTML='<div class="empty">Loading inbox…</div>';return;}
    const tasks=Array.isArray(dash.todays_tasks)?dash.todays_tasks.slice():[];
    const tickets=Array.isArray(dash.open_tickets)?dash.open_tickets.slice():[];
    const users=Array.isArray(dash.users)?dash.users.slice():[];
    tickets.sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
    const overdue=[],urgent=[],normal=[];
    for(const t of tasks){
      if(t.is_overdue)overdue.push(t);
      else if(t.is_urgent)urgent.push(t);
      else normal.push(t);
    }
    overdue.sort((a,b)=>new Date(a.due_date||0)-new Date(b.due_date||0));
    urgent.sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0));
    const priOrder={urgent:0,high:1,normal:2,low:3};
    normal.sort((a,b)=>{
      const pa=priOrder[a.priority]||9,pb=priOrder[b.priority]||9;
      if(pa!==pb)return pa-pb;
      return new Date(a.created_at||0)-new Date(b.created_at||0);
    });
    const blocked=users.filter(u=>u.blocker_status);
    let h=`<div class="today-header">
      <div><h2>Inbox</h2><p>Everything live right now, sorted by what needs action first.</p></div>
      <div><button class="btn" data-va-refresh>Refresh</button></div>
    </div>`;
    if(tickets.length){
      h+=`<div class="inbox-section-title">🎫 Support Tickets (FIFO) <span class="count red">${tickets.length}</span></div><div class="today-grid">${tickets.map(ticketCard).join("")}</div>`;
    }
    if(urgent.length){
      h+=`<div class="inbox-section-title">Urgent <span class="count red">${urgent.length}</span></div><div class="today-grid">${urgent.map(taskCard).join("")}</div>`;
    }
    if(overdue.length){
      h+=`<div class="inbox-section-title">Overdue <span class="count amber">${overdue.length}</span></div><div class="today-grid">${overdue.map(taskCard).join("")}</div>`;
    }
    if(blocked.length){
      h+=`<div class="inbox-section-title">Blocked cases <span class="count">${blocked.length}</span></div><div>${blocked.map(blockerRow).join("")}</div>`;
    }
    if(normal.length){
      h+=`<div class="inbox-section-title">Normal <span class="count">${normal.length}</span></div><div class="today-grid">${normal.map(taskCard).join("")}</div>`;
    }
    if(!tickets.length&&!urgent.length&&!overdue.length&&!blocked.length&&!normal.length){
      h+='<div class="empty" style="margin-top:20px">All clear — no pending tickets or tasks. 🎉</div>';
    }
    el.innerHTML=h;
  }

  function openNudgeModal(userId,stage,substage,firstName){
    const title="Send Nudge to "+(firstName||"GP");
    const body=`<div class="nudge-modal-body">
      <label>Current Stage</label>
      <input type="text" id="nudgeStage" value="${esc(stage||"")}" />
      <label>Substage (optional)</label>
      <input type="text" id="nudgeSubstage" value="${esc(substage||"")}" />
      <label>Custom message (leave blank to use stage default)</label>
      <textarea id="nudgeMessage" placeholder="Auto-generated from stage/substage…"></textarea>
      <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:8px">
        <button class="btn" data-close-modal>Cancel</button>
        <button class="btn nudge" id="nudgeSendBtn">Send Nudge</button>
      </div>
    </div>`;
    document.getElementById("modalTitle").textContent=title;
    document.getElementById("modalBody").innerHTML=body;
    document.getElementById("modalOverlay").style.display="flex";
    document.getElementById("nudgeSendBtn").onclick=async()=>{
      const stageV=document.getElementById("nudgeStage").value||null;
      const substageV=document.getElementById("nudgeSubstage").value||null;
      const messageV=(document.getElementById("nudgeMessage").value||"").trim()||null;
      try{
        const r=await fetch("/api/admin/va/nudge",{method:"POST",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({user_id:userId,stage:stageV,substage:substageV,message:messageV})});
        const d=await r.json().catch(()=>({}));
        if(d&&d.ok){toast("Nudge sent");closeModal();}
        else{toast((d&&d.message)||"Failed to send nudge","red");}
      }catch{toast("Network error","red");}
    };
  }

  function runGlobalSearch(q){
    if(!q||q.length<2){S.search.open=false;renderSearchResults();return;}
    S.search.query=q;
    const ql=q.toLowerCase();

    // Client-side: GPs
    const gpList=(S.va.dashboard&&Array.isArray(S.va.dashboard.users))?S.va.dashboard.users:[];
    S.search.clientResults.gps=gpList.filter(u=>
      (u.gp_name||"").toLowerCase().includes(ql)||
      (u.gp_email||"").toLowerCase().includes(ql)||
      (u.gp_phone||"").includes(ql)||
      (u.practice_name||"").toLowerCase().includes(ql)
    ).slice(0,20);

    // Client-side: Tasks
    const taskList=[...(S.tasks||[]),...((S.va.dashboard&&S.va.dashboard.todays_tasks)||[])];
    const seenT=new Set();
    S.search.clientResults.tasks=taskList.filter(t=>{
      if(seenT.has(t.id))return false;seenT.add(t.id);
      return(t.title||"").toLowerCase().includes(ql)||(t.description||"").toLowerCase().includes(ql);
    }).slice(0,20);

    // Client-side: Tickets
    const ticketList=[...((S.va.dashboard&&S.va.dashboard.open_tickets)||[]),...(S.va.tickets||[])];
    const seenTk=new Set();
    S.search.clientResults.tickets=ticketList.filter(tk=>{
      if(seenTk.has(tk.id))return false;seenTk.add(tk.id);
      return(tk.title||"").toLowerCase().includes(ql)||(tk.body||"").toLowerCase().includes(ql)||(tk.category||"").toLowerCase().includes(ql);
    }).slice(0,20);

    S.search.open=true;
    renderSearchResults();

    // Server-side: documents + notes
    S.search.loading=true;
    clearTimeout(S.search.debounceTimer);
    S.search.debounceTimer=setTimeout(async()=>{
      try{
        const r=await fetch("/api/admin/va/search?q="+encodeURIComponent(q),{credentials:"same-origin"});
        const d=await r.json().catch(()=>({}));
        if(d&&d.ok&&d.results){
          S.search.serverResults.documents=Array.isArray(d.results.documents)?d.results.documents:[];
          S.search.serverResults.notes=Array.isArray(d.results.notes)?d.results.notes:[];
        }
      }catch{
        S.search.serverResults.documents=[];
        S.search.serverResults.notes=[];
      }
      S.search.loading=false;
      if(S.search.open)renderSearchResults();
    },200);
  }

  function renderSearchResults(){
    const el=document.getElementById("globalSearchResults");if(!el)return;
    if(!S.search.open){el.style.display="none";return;}
    el.style.display="block";
    const gps=S.search.clientResults.gps.slice(0,5);
    const tasks=S.search.clientResults.tasks.slice(0,5);
    const tickets=S.search.clientResults.tickets.slice(0,5);
    const docs=S.search.serverResults.documents.slice(0,5);
    const notes=S.search.serverResults.notes.slice(0,5);
    const total=gps.length+tasks.length+tickets.length+docs.length+notes.length;
    if(!total&&!S.search.loading){el.innerHTML='<div class="top-search-empty">No results found.</div>';return;}
    let h='';
    function group(title,items,renderer,allItems){
      if(!items.length)return'';
      let s='<div class="top-search-group"><div class="top-search-group-title">'+esc(title)+'</div>';
      s+=items.map(renderer).join("");
      if(allItems.length>5)s+='<div class="top-search-more" data-search-expand="'+esc(title.toLowerCase())+'">+ '+(allItems.length-5)+' more</div>';
      s+='</div>';
      return s;
    }
    h+=group("GPs",gps,function(g){return'<div class="top-search-row" data-search-gp="'+esc(g.case_id)+'"><div class="top-search-row-main">'+esc(g.gp_name)+'</div><div class="top-search-row-sub">'+esc(g.stage||"")+'</div></div>';},S.search.clientResults.gps);
    h+=group("Tasks",tasks,function(t){return'<div class="top-search-row" data-search-task="'+esc(t.id)+'" data-search-case="'+esc(t.case_id)+'"><div class="top-search-row-main">'+esc(t.title)+'</div><div class="top-search-row-sub">'+esc(t.gp_name||"")+'</div></div>';},S.search.clientResults.tasks);
    h+=group("Tickets",tickets,function(tk){return'<div class="top-search-row" data-search-ticket="'+esc(tk.id)+'" data-search-user="'+esc(tk.user_id)+'"><div class="top-search-row-main">'+esc(tk.title||"Support request")+'</div><div class="top-search-row-sub">'+esc(tk.gp_name||"")+'</div></div>';},S.search.clientResults.tickets);
    h+=group("Documents",docs,function(d){return'<div class="top-search-row" data-search-doc-user="'+esc(d.user_id)+'" data-search-doc-key="'+esc(d.key)+'"><div class="top-search-row-main">'+esc(d.label)+' — '+esc(d.file_name)+'</div><div class="top-search-row-sub">'+esc(d.gp_name||"")+'</div></div>';},S.search.serverResults.documents);
    h+=group("Notes",notes,function(n){return'<div class="top-search-row" data-search-note-case="'+esc(n.case_id)+'"><div class="top-search-row-main">'+esc(n.title||n.event_type||"note")+'</div><div class="top-search-row-sub">'+esc(n.gp_name||"")+' · '+fmtR(n.created_at)+'</div></div>';},S.search.serverResults.notes);
    if(S.search.loading)h+='<div class="top-search-footer">Searching documents and notes…</div>';
    el.innerHTML=h;
  }

  async function closeTicketAction(ticketId,nextStatus){
    try{
      const r=await fetch("/api/admin/va/ticket/"+encodeURIComponent(ticketId),{method:"PUT",credentials:"same-origin",headers:{"Content-Type":"application/json"},body:JSON.stringify({status:nextStatus})});
      const d=await r.json().catch(()=>({}));
      if(d&&d.ok){toast(nextStatus==="closed"?"Ticket resolved":"Ticket reopened");await loadVaDashboard();if(S.view==="tickets"){await loadVaTickets();/*TASK4 renderTicketsPanel()*/}else if(S.view==="inbox"){renderInboxPanel();}}
      else toast((d&&d.message)||"Failed","red");
    }catch{toast("Network error","red");}
  }

  async function runWeeklyCheckinSweep(){
    try{
      const r=await fetch("/api/admin/va/weekly-checkin/sweep",{method:"POST",credentials:"same-origin"});
      const d=await r.json().catch(()=>({}));
      if(d&&d.ok){
        S.va.lastSweepResult={scanned:d.scanned||0,created:d.created||0,at:new Date().toISOString()};
        toast("Weekly sweep: "+(d.created||0)+" new check-in tasks (scanned "+(d.scanned||0)+")");
      }else toast("Sweep failed","red");
      await loadVaDashboard();
      if(S.view==="inbox")renderInboxPanel();
      if(S.view==="tools"&&S.toolsSubView==="sweep")renderToolsSweepPane();
    }catch{toast("Network error","red");}
  }


  /* Delegated click handlers for interviews panel */
  document.addEventListener("click",async e=>{
    const ivPanel=document.getElementById("interviewsPanel");
    if(!ivPanel||!ivPanel.contains(e.target))return;
    const ivSubmit=e.target.closest("[data-iv-submit]");
    if(ivSubmit){e.preventDefault();e.stopPropagation();await submitInterview();return;}
    const ivComplete=e.target.closest("[data-iv-complete]");
    if(ivComplete){e.preventDefault();e.stopPropagation();await updateInterviewStatus(ivComplete.getAttribute("data-iv-complete"),"completed");return;}
    const ivCancel=e.target.closest("[data-iv-cancel]");
    if(ivCancel){e.preventDefault();e.stopPropagation();await updateInterviewStatus(ivCancel.getAttribute("data-iv-cancel"),"cancelled");return;}
    const ivRefresh=e.target.closest("[data-iv-refresh]");
    if(ivRefresh){e.preventDefault();e.stopPropagation();await loadInterviews();return;}
  },true);

  /* Delegated click handlers for applications panel */
  document.addEventListener("click",async e=>{
    const appPanel=document.getElementById("applicationsPanel");
    if(!appPanel||!appPanel.contains(e.target))return;
    const appRefresh=e.target.closest("[data-app-refresh]");
    if(appRefresh){e.preventDefault();e.stopPropagation();await loadAdminApplications();return;}
    const appSchedule=e.target.closest("[data-app-schedule]");
    if(appSchedule){
      e.preventDefault();e.stopPropagation();
      const appId=appSchedule.getAttribute("data-app-schedule");
      S.view="interviews";
      document.querySelectorAll(".view-tab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-view")==="interviews"));
      vaShowPanel("interviews");
      await loadInterviews();
      const ivAppIdInput=document.getElementById("ivAppId");
      if(ivAppIdInput){ivAppIdInput.value=appId;ivAppIdInput.focus();}
      return;
    }
  },true);

  /* Delegated click handlers for Inbox and Tools panels */
  document.addEventListener("click",async e=>{
    const ib=document.getElementById("inboxPanel");
    const tl=document.getElementById("toolsPanel");
    const inInbox=ib&&ib.contains(e.target);
    const inTools=tl&&tl.contains(e.target);
    if(!inInbox&&!inTools)return;

    const subBtn=e.target.closest("[data-tools-sub]");
    if(subBtn){e.preventDefault();e.stopPropagation();S.toolsSubView=subBtn.getAttribute("data-tools-sub");renderToolsPanel();return;}

    const sweepRun=e.target.closest("[data-tools-sweep-run]");
    if(sweepRun){e.preventDefault();e.stopPropagation();runWeeklyCheckinSweep();return;}

    const refresh=e.target.closest("[data-va-refresh]");
    if(refresh){e.preventDefault();e.stopPropagation();await loadVaDashboard();if(S.view==="inbox")renderInboxPanel();return;}

    const closeT=e.target.closest("[data-close-ticket]");
    if(closeT){e.preventDefault();e.stopPropagation();await closeTicketAction(closeT.getAttribute("data-close-ticket"),"closed");return;}

    const nudge=e.target.closest("[data-nudge-user]");
    if(nudge){e.preventDefault();e.stopPropagation();openNudgeModal(nudge.getAttribute("data-nudge-user"),nudge.getAttribute("data-nudge-stage"),nudge.getAttribute("data-nudge-substage"),nudge.getAttribute("data-nudge-name"));return;}

    const complete=e.target.closest("[data-complete-todo-task]");
    if(complete){e.preventDefault();e.stopPropagation();const tid=complete.getAttribute("data-complete-todo-task");await completeTask(tid);await loadVaDashboard();if(S.view==="inbox")renderInboxPanel();return;}

    const openCase=e.target.closest("[data-view-todo-case]");
    if(openCase){e.preventDefault();e.stopPropagation();S.selectedCaseId=openCase.getAttribute("data-view-todo-case");S.view="gps";document.querySelectorAll(".view-tab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-view")==="gps"));vaShowPanel("gps");renderCaseList();renderDetail();return;}

    const blocker=e.target.closest("[data-blocker-case]");
    if(blocker&&!e.target.closest("[data-view-todo-case]")){e.preventDefault();e.stopPropagation();S.selectedCaseId=blocker.getAttribute("data-blocker-case");S.view="gps";document.querySelectorAll(".view-tab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-view")==="gps"));vaShowPanel("gps");renderCaseList();renderDetail();return;}
  },true);

  /* Delegated click handlers for Agent sub-view (SA only) */

    const agConnect=e.target.closest("[data-agent-connect]");if(agConnect){showAgentConnectHelp(agConnect.getAttribute("data-agent-connect"));return;}

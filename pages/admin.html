<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - GP Link</title>
  <style>
    :root {
      --bg: #f4f6fb;
      --panel: #ffffff;
      --line: #dfe6f2;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --green: #16a34a;
      --amber: #b45309;
      --red: #dc2626;
      --purple-1: #7c3aed;
      --purple-2: #6366f1;
      --radius-lg: 14px;
      --radius-md: 10px;
      --shadow: 0 20px 36px -28px rgba(15, 23, 42, 0.5);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "SF Pro Text", "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(1000px 560px at 50% -12%, #fff, var(--bg));
      padding: 16px;
    }

    .app {
      max-width: 1240px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .hero {
      border-radius: var(--radius-lg);
      background: linear-gradient(120deg, var(--purple-1), var(--purple-2));
      color: #fff;
      padding: 18px;
      box-shadow: var(--shadow);
    }
    .hero h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.03em;
      font-weight: 760;
    }
    .hero p {
      margin: 6px 0 0;
      font-size: 13px;
      opacity: 0.92;
      font-weight: 560;
    }
    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .integration-panel {
      padding: 16px;
      display: grid;
      gap: 14px;
    }
    .integration-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .integration-title {
      margin: 0;
      font-size: 20px;
      font-weight: 780;
      letter-spacing: -0.02em;
    }
    .integration-copy {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
      font-weight: 560;
    }
    .integration-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .status-chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid #dbe3ee;
      background: #f8fafc;
      color: #334155;
    }
    .status-chip.connected {
      background: #ebf9f0;
      border-color: #b9e8c8;
      color: #166534;
    }
    .status-chip.pending {
      background: #fff7ed;
      border-color: #fdba74;
      color: #9a3412;
    }
    .status-chip.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }
    .status-chip.disconnected {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }
    .integration-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .integration-tile {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      padding: 12px;
      display: grid;
      gap: 4px;
    }
    .integration-label {
      font-size: 11px;
      font-weight: 800;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .integration-value {
      font-size: 16px;
      font-weight: 760;
      color: #0f172a;
      line-height: 1.25;
      word-break: break-word;
    }
    .integration-sub {
      font-size: 12px;
      color: var(--muted);
      font-weight: 560;
    }
    .integration-banner {
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 650;
      border: 1px solid #dbe3ee;
      background: #f8fafc;
      color: #334155;
    }
    .integration-banner.success {
      background: #ebf9f0;
      border-color: #b9e8c8;
      color: #166534;
    }
    .integration-banner.error {
      background: #fef2f2;
      border-color: #fecaca;
      color: #b91c1c;
    }
    .integration-banner.pending {
      background: #fff7ed;
      border-color: #fdba74;
      color: #9a3412;
    }
    .integration-note {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 560;
    }
    .mono-inline {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 11px;
      color: #334155;
      background: #f8fafc;
      border: 1px solid #dbe3ee;
      border-radius: 8px;
      padding: 2px 6px;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 12px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 4px;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }
    .stat .value {
      font-size: 26px;
      letter-spacing: -0.02em;
      font-weight: 760;
      line-height: 1.1;
    }
    .stat .sub {
      font-size: 11px;
      font-weight: 700;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .tab {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: #1f2937;
      font: inherit;
      padding: 12px 14px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-width: 220px;
    }
    .tab.active {
      color: var(--blue);
      background: #eff6ff;
      box-shadow: inset 0 -2px 0 var(--blue);
    }

    .toolbar {
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .input,
    .btn {
      border-radius: 8px;
      font: inherit;
      font-size: 13px;
    }
    .input {
      border: 1px solid #cdd7e6;
      padding: 10px;
      width: 100%;
    }
    .btn {
      border: 1px solid #c7d9ff;
      background: #f2f7ff;
      color: #1d4ed8;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }
    .btn.hero-btn {
      border-color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.18);
      color: #fff;
    }

    .content {
      padding: 12px;
      display: grid;
      gap: 10px;
      min-height: 320px;
      background: #fbfdff;
    }

    .row {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .row-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: start;
    }

    .name {
      margin: 0;
      font-size: 15px;
      font-weight: 760;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      display: grid;
      gap: 2px;
    }

    .badge {
      border-radius: 999px;
      border: 1px solid #dbe3ee;
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: inline-flex;
      width: fit-content;
      background: #f8fafc;
      color: #334155;
    }
    .badge.active { background: #ebf9f0; border-color: #b9e8c8; color: #166534; }
    .badge.stalled { background: #fff7ed; border-color: #fdba74; color: #9a3412; }
    .badge.action_required { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
    .badge.complete { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .badge.ticket-open { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
    .badge.ticket-closed { background: #f1f5f9; border-color: #dbe4ef; color: #475569; }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #334155;
      font-size: 11px;
      font-weight: 650;
    }

    .bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }
    .bar > span {
      display: block;
      height: 100%;
      background: #2563eb;
      border-radius: 999px;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .empty {
      border: 1px dashed #ced9ea;
      border-radius: 10px;
      padding: 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      background: #fff;
    }

    .inline-note {
      font-size: 12px;
      color: var(--muted);
      font-weight: 560;
      margin-left: 2px;
    }
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(15, 23, 42, 0.52);
      padding: 14px;
    }
    .modal.open { display: flex; }
    .modal-card {
      width: min(760px, 100%);
      max-height: calc(100vh - 28px);
      overflow: auto;
      background: #fff;
      border: 1px solid #d8e2f0;
      border-radius: 14px;
      box-shadow: 0 32px 60px -42px rgba(15, 23, 42, 0.85);
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }
    .modal-title {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .modal-close {
      border: 0;
      background: transparent;
      color: #334155;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      padding: 4px;
    }
    .modal-body {
      padding: 14px 16px 18px;
      display: grid;
      gap: 14px;
    }
    .candidate-top {
      display: grid;
      gap: 8px;
    }
    .candidate-top-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .candidate-name {
      margin: 0;
      font-size: 22px;
      font-weight: 760;
      letter-spacing: -0.02em;
    }
    .candidate-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }
    .field-label {
      color: #64748b;
      font-size: 12px;
      font-weight: 650;
      margin: 0;
    }
    .field-value {
      color: #0f172a;
      font-size: 14px;
      font-weight: 650;
      margin: 2px 0 0;
    }
    .progress-panel h4 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 760;
    }
    .stepper-shell {
      margin-top: 8px;
      border-radius: 16px;
      background: linear-gradient(135deg, #eef5ff 0%, #f8fbff 55%, #f1efff 100%);
      padding: 10px;
    }
    .stepper-nav {
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #e8eef9;
      box-shadow: 0 14px 30px -24px rgba(15, 23, 42, 0.45);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      padding: 12px 14px 10px;
    }
    .step-item {
      position: relative;
      flex: 1 1 0;
      min-width: 0;
      text-align: center;
    }
    .step-item::after {
      content: "";
      position: absolute;
      top: 12px;
      left: calc(50% + 14px);
      width: calc(100% - 28px);
      height: 1px;
      background: #d9deea;
    }
    .step-item:last-child::after { display: none; }
    .step-marker {
      width: 24px;
      height: 24px;
      margin: 0 auto 6px;
      border-radius: 999px;
      border: 1px solid #7845ff;
      background: #7845ff;
      color: #ffffff;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1;
    }
    .step-label {
      margin: 0;
      font-size: 12px;
      font-weight: 650;
      color: #1f2937;
      line-height: 1.2;
    }
    .step-help {
      margin: 2px 0 0;
      font-size: 10px;
      color: #6b7280;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .btn.ghost {
      border: 1px solid #d4deee;
      background: #f8fafc;
      color: #1f2937;
    }
    .info-section {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }
    .info-section h5 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 760;
      color: #0f172a;
    }
    .ticket-split {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .mini-list {
      border: 1px solid #dbe5f2;
      border-radius: 10px;
      background: #fbfdff;
      padding: 8px;
      display: grid;
      gap: 6px;
      min-height: 74px;
    }
    .mini-list-title {
      margin: 0;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #64748b;
    }
    .mini-item {
      border: 1px solid #e2eaf6;
      border-radius: 8px;
      background: #fff;
      padding: 6px 8px;
      display: grid;
      gap: 2px;
    }
    .mini-item-title {
      margin: 0;
      font-size: 12px;
      font-weight: 700;
      color: #111827;
    }
    .mini-item-meta {
      margin: 0;
      font-size: 11px;
      color: #64748b;
      font-weight: 600;
    }
    .docs-table {
      border: 1px solid #dbe5f2;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .docs-head,
    .docs-row {
      display: grid;
      grid-template-columns: 1.5fr 1fr auto auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
    }
    .docs-head {
      background: #f8fbff;
      border-bottom: 1px solid #e3ebf7;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #64748b;
    }
    .docs-row {
      border-bottom: 1px solid #eef3fa;
      font-size: 12px;
      color: #1f2937;
      font-weight: 650;
    }
    .docs-row:last-child { border-bottom: 0; }
    .doc-pill {
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: 1px solid #dce7f5;
      background: #f8fafc;
      color: #475569;
      justify-self: start;
    }
    .doc-pill.accepted { border-color: #b9e8c8; background: #ebf9f0; color: #166534; }
    .doc-pill.under_review { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
    .doc-pill.rejected { border-color: #fecaca; background: #fef2f2; color: #b91c1c; }
    .doc-pill.pending { border-color: #fde68a; background: #fffbeb; color: #92400e; }

    @media (max-width: 1024px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .integration-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tab { min-width: 0; flex: 1; }
      .toolbar { grid-template-columns: 1fr; }
      .ticket-split { grid-template-columns: 1fr; }
      .docs-head,
      .docs-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      body { padding: 10px; }
      .hero h1 { font-size: 24px; }
      .stats { grid-template-columns: 1fr; }
      .integration-grid { grid-template-columns: 1fr; }
      .modal-title { font-size: 24px; }
      .candidate-grid { grid-template-columns: 1fr; }
      .stepper-nav {
        flex-direction: column;
        align-items: stretch;
        gap: 8px;
      }
      .step-item {
        text-align: left;
        display: grid;
        grid-template-columns: 24px 1fr;
        column-gap: 8px;
        align-items: center;
      }
      .step-item::after { display: none; }
      .step-marker { margin: 0; }
      .step-copy { min-width: 0; }
      .step-help { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-top">
        <h1>Admin Dashboard</h1>
        <button class="btn hero-btn" id="logoutBtn" type="button">Sign Out</button>
      </div>
      <p>Manage GP registrations, verify certificates, and respond to support tickets.</p>
      <p id="refreshText" class="inline-note">Loading...</p>
    </header>

    <section class="panel integration-panel" id="zohoRecruitPanel">
      <div class="empty">Loading Zoho Recruit status...</div>
    </section>

    <section class="stats" id="stats"></section>

    <section class="panel">
      <div class="tabs">
        <button class="tab active" type="button" data-tab="registrations">GP Registrations</button>
        <button class="tab" type="button" data-tab="verifications">Certificate Verifications</button>
        <button class="tab" type="button" data-tab="tickets">Support Tickets</button>
      </div>

      <div class="toolbar">
        <input class="input" id="searchInput" type="search" placeholder="Search GP by name, email, or country..." />
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
        <button class="btn primary" id="exportBtn" type="button">Export</button>
      </div>

      <div class="content" id="content"></div>
    </section>
  </div>
  <div class="modal" id="candidateModal" role="dialog" aria-modal="true" aria-labelledby="candidateModalTitle">
    <div class="modal-card">
      <header class="modal-head">
        <h2 class="modal-title" id="candidateModalTitle">GP Details</h2>
        <button class="modal-close" id="candidateModalClose" type="button" aria-label="Close">×</button>
      </header>
      <div class="modal-body" id="candidateModalBody"></div>
    </div>
  </div>

    function fmtDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleDateString();
    }

    function fmtDateTime(value) {
      if (!value) return "Never";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "Never";
      return date.toLocaleString();
    }

    function fmtRelative(value) {
      if (!value) return "No activity yet";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "No activity yet";
      const diffMs = Date.now() - date.getTime();
      const mins = Math.max(1, Math.round(diffMs / 60000));
      if (mins < 60) return `Last active: ${mins} min ago`;
      const hours = Math.round(mins / 60);
      if (hours < 24) return `Last active: ${hours} hour${hours === 1 ? "" : "s"} ago`;
      const days = Math.round(hours / 24);
      return `Last active: ${days} day${days === 1 ? "" : "s"} ago`;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function toTitleLabel(value) {
      const raw = String(value || "").trim();
      if (!raw) return "-";
      return raw
        .replace(/[_-]+/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function buildZohoNoticeFromParams() {
      const params = new URLSearchParams(window.location.search);
      const zohoState = String(params.get("zohoRecruit") || "").trim();
      const syncState = String(params.get("sync") || "").trim();
      const roles = String(params.get("roles") || "").trim();
      const message = String(params.get("message") || "").trim();
      if (!zohoState && !syncState && !message && !roles) return null;

      let tone = "pending";
      let text = "Zoho Recruit status updated.";
      if (syncState === "success") {
        tone = "success";
        text = roles
          ? `Zoho Recruit connected and synced successfully. ${roles} live roles are now available.`
          : "Zoho Recruit connected and synced successfully.";
      } else if (syncState === "error" || zohoState === "error") {
        tone = "error";
        text = message || "Zoho Recruit connection or sync failed.";
      } else if (zohoState === "connected") {
        tone = "success";
        text = "Zoho Recruit is connected.";
      } else if (message) {
        tone = "pending";
        text = message;
      }

      ["zohoRecruit", "sync", "roles", "message"].forEach((key) => params.delete(key));
      const nextUrl = `${window.location.pathname}${params.toString() ? `?${params.toString()}` : ""}${window.location.hash || ""}`;
      window.history.replaceState({}, document.title, nextUrl);
      return { tone, text };
    }

        <div class="integration-note">
          <span>Redirect URI: <span class="mono-inline">${escapeHtml(data.redirectUri || "-")}</span></span>
          <span>Scopes: <span class="mono-inline">${escapeHtml(Array.isArray(data.scopes) && data.scopes.length ? data.scopes.join(", ") : "-")}</span></span>
        </div>
      `;
    }

    async function loadZohoRecruitStatus(force = false) {
      if (state.isZohoLoading && !force) return;
      state.isZohoLoading = true;
      renderZohoRecruitPanel();
      try {
        const response = await fetch("/api/admin/integrations/zoho-recruit/status", {
          credentials: "same-origin"
        });
        if (response.status === 401) {
          window.location.href = "/pages/admin-signin.html";
          return;
        }
        if (response.status === 403) {
          throw new Error("This account does not have admin access.");
        }
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Failed to load Zoho Recruit status.");
        }
        state.zohoRecruit = data;
      } catch (err) {
        state.zohoRecruit = {
          ok: false,
          configured: false,
          connected: false,
          cronConfigured: false,
          cronPath: "/api/integrations/zoho-recruit/cron-sync",
          redirectUri: "",
          accountsServer: "",
          scopes: [],
          connection: err && err.message ? { status: "error", lastSyncStatus: "error", lastSyncError: err.message } : null,
          roleCount: 0
        };
        state.zohoRecruitNotice = { tone: "error", text: err.message || "Failed to load Zoho Recruit status." };
      } finally {
        state.isZohoLoading = false;
        renderZohoRecruitPanel();
      }
    }

    async function triggerZohoRecruitSync() {
      if (state.isZohoSyncing) return;
      state.isZohoSyncing = true;
      renderZohoRecruitPanel();
      try {
        const response = await fetch("/api/admin/integrations/zoho-recruit/sync", {
          method: "POST",
          credentials: "same-origin"
        });
        if (response.status === 401) {
          window.location.href = "/pages/admin-signin.html";
          return;
        }
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.message || "Failed to sync Zoho Recruit.");
        }
        const roleCount = Number(data.syncedRoleCount || 0);
        state.zohoRecruitNotice = {
          tone: "success",
          text: `Zoho Recruit sync completed. ${roleCount} live role${roleCount === 1 ? "" : "s"} stored.`
        };
        await loadZohoRecruitStatus(true);
      } catch (err) {
        state.zohoRecruitNotice = {
          tone: "error",
          text: err.message || "Zoho Recruit sync failed."
        };
        renderZohoRecruitPanel();
      } finally {
        state.isZohoSyncing = false;
        renderZohoRecruitPanel();
      }
    }

    function filteredCandidates() {
      const list = state.dashboard ? state.dashboard.candidates : [];
      const query = state.query.trim().toLowerCase();
      if (!query) return list;
      return list.filter((item) => {
        const text = `${item.name} ${item.email} ${item.country || ""}`.toLowerCase();
        return text.includes(query);
      });
    }

    function filteredVerifications() {
      const list = state.dashboard ? state.dashboard.verificationQueue : [];
      const query = state.query.trim().toLowerCase();
      if (!query) return list;
      return list.filter((item) => {
        const text = `${item.name} ${item.email} ${item.currentStepLabel}`.toLowerCase();
        return text.includes(query);
      });
    }

    function filteredTickets() {
      const list = state.dashboard ? state.dashboard.tickets : [];
      const query = state.query.trim().toLowerCase();
      if (!query) return list;
      return list.filter((item) => {
        const text = `${item.title} ${item.candidateName} ${item.candidateEmail} ${item.category}`.toLowerCase();
        return text.includes(query);
      });
    }

    function renderRegistrations() {
      const list = filteredCandidates();
      if (!list.length) {
        contentEl.innerHTML = `<div class="empty">No GP registrations match your search.</div>`;
        return;
      }

      contentEl.innerHTML = list.map((candidate) => `
        <article class="row">
          <div class="row-top">
            <div>
              <h3 class="name">${candidate.name}</h3>
              <div class="meta">
                <span>${candidate.email}</span>
                <span>${candidate.phone || "Phone not provided"}</span>
                <span>Registered: ${fmtDate(candidate.registeredAt)}</span>
                <span>${fmtRelative(candidate.lastActiveAt)}</span>
              </div>
            </div>
            <span class="badge ${candidate.status}">${candidate.status.replace(/_/g, " ")}</span>
          </div>
          <div class="progress-meta">
            <span>Progress: Step ${candidate.currentStepIndex}/${candidate.totalSteps} • ${candidate.currentStepLabel}</span>
            <span>${candidate.progressPercent}%</span>
          </div>
          <div class="bar"><span style="width:${candidate.progressPercent}%"></span></div>
          <div class="row-actions">
            <button class="btn" data-view-candidate="${candidate.id}" type="button">View</button>
          </div>
        </article>
      `).join("");
    }

    function renderVerifications() {
      const list = filteredVerifications();
      if (!list.length) {
        contentEl.innerHTML = `<div class="empty">No certificate checks pending right now.</div>`;
        return;
      }

      contentEl.innerHTML = list.map((candidate) => `
        <article class="row">
          <div class="row-top">
            <div>
              <h3 class="name">${candidate.name}</h3>
              <div class="meta">
                <span>${candidate.email}</span>
                <span>Current step: ${candidate.currentStepLabel}</span>
                <span>Documents pending: ${candidate.documentsPending}</span>
              </div>
            </div>
            <span class="badge ${candidate.actionRequired ? "action_required" : "active"}">${candidate.actionRequired ? "Action required" : "Awaiting review"}</span>
          </div>
          <div class="progress-meta">
            <span>Registration progress</span>
            <span>${candidate.progressPercent}%</span>
          </div>
          <div class="bar"><span style="width:${candidate.progressPercent}%"></span></div>
          <div class="row-actions">
            <button class="btn" data-view-candidate="${candidate.id}" type="button">View</button>
          </div>
        </article>
      `).join("");
    }

    function renderTickets() {
      const list = filteredTickets();
      if (!list.length) {
        contentEl.innerHTML = `<div class="empty">No support tickets match your search.</div>`;
        return;
      }

      contentEl.innerHTML = list.map((ticket) => `
        <article class="row">
          <div class="row-top">
            <div>
              <h3 class="name">${ticket.title}</h3>
              <div class="meta">
                <span>${ticket.candidateName} • ${ticket.candidateEmail}</span>
                <span>${ticket.category} • Priority: ${ticket.priority}</span>
                <span>Updated: ${new Date(ticket.updatedAt).toLocaleString()}</span>
              </div>
            </div>
            <span class="badge ticket-${ticket.status}">${ticket.status}</span>
          </div>
          <div class="meta">${ticket.lastMessage || "No messages yet."}</div>
          <div class="row-actions">
            <button class="btn" data-reply-ticket="${ticket.id}" data-candidate-email="${ticket.candidateEmail || ""}" data-candidate-user-id="${ticket.candidateUserId || ""}" type="button">Reply</button>
            <button class="btn primary" data-toggle-ticket="${ticket.id}" data-candidate-email="${ticket.candidateEmail || ""}" data-candidate-user-id="${ticket.candidateUserId || ""}" data-next-status="${ticket.status === "closed" ? "open" : "closed"}" type="button">${ticket.status === "closed" ? "Reopen" : "Close"}</button>
          </div>
        </article>
      `).join("");
    }

    function renderContent() {
      if (!state.dashboard) {
        contentEl.innerHTML = `<div class="empty">Loading dashboard...</div>`;
        return;
      }
      if (state.tab === "registrations") renderRegistrations();
      if (state.tab === "verifications") renderVerifications();
      if (state.tab === "tickets") renderTickets();
    }

    function renderTabLabels() {
      const summary = state.dashboard ? state.dashboard.summary : { totalGps: 0, pendingVerifications: 0, openSupportTickets: 0 };
      const labels = {
        registrations: `GP Registrations (${summary.totalGps})`,
        verifications: `Certificate Verifications (${summary.pendingVerifications})`,
        tickets: `Support Tickets (${summary.openSupportTickets})`
      };

      document.querySelectorAll(".tab").forEach((tab) => {
        const key = tab.getAttribute("data-tab");
        tab.textContent = labels[key] || tab.textContent;
        tab.classList.toggle("active", key === state.tab);
      });
    }

    async function loadDashboard(force = false) {
      if (state.isLoading && !force) return;
      state.isLoading = true;
      refreshTextEl.textContent = "Loading latest data...";
      try {
        const response = await fetch("/api/admin/dashboard", { credentials: "same-origin" });
        if (response.status === 401) {
          window.location.href = "/pages/admin-signin.html";
          return;
        }
        if (response.status === 403) {
          throw new Error("This account does not have admin access. Set ADMIN_EMAILS in your environment.");
        }
        if (!response.ok) {
          throw new Error("Failed to load admin dashboard.");
        }
        const data = await response.json();
        state.dashboard = data;
        renderStats();
        renderTabLabels();
        renderContent();
        refreshTextEl.textContent = `Updated ${new Date(data.refreshedAt).toLocaleString()}`;
      } catch (err) {
        state.dashboard = {
          summary: { totalGps: 0, activeGps: 0, pendingVerifications: 0, openSupportTickets: 0, averageProgress: 0 },
          candidates: [],
          verificationQueue: [],
          tickets: []
        };
        renderStats();
        renderTabLabels();
        renderContent();
        refreshTextEl.textContent = `Unable to load live dashboard data (${err.message}).`;
      } finally {
        state.isLoading = false;
      }
    }

    async function updateTicket(ticketId, payload) {
      const response = await fetch(`/api/admin/tickets/${encodeURIComponent(ticketId)}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        credentials: "same-origin",
        body: JSON.stringify(payload || {})
      });
      if (!response.ok) {
        const data = await response.json().catch(() => ({}));
        throw new Error(data.message || "Unable to update ticket.");
      }
    }

    function exportCurrentTab() {
      if (!state.dashboard) return;
      const rows = state.tab === "tickets"
        ? filteredTickets().map((item) => ({
            title: item.title,
            candidate: item.candidateName,
            email: item.candidateEmail,
            category: item.category,
            status: item.status,
            priority: item.priority,
            updatedAt: item.updatedAt
          }))
        : (state.tab === "verifications" ? filteredVerifications() : filteredCandidates()).map((item) => ({
            name: item.name,
            email: item.email,
            country: item.country,
            currentStep: item.currentStepLabel,
            progress: `${item.progressPercent}%`,
            status: item.status,
            openTickets: item.openTickets,
            lastActiveAt: item.lastActiveAt
          }));

      if (!rows.length) return;
      const headers = Object.keys(rows[0]);
      const lines = [headers.join(",")];
      rows.forEach((row) => {
        const line = headers.map((header) => {
          const value = String(row[header] == null ? "" : row[header]);
          if (value.includes(",") || value.includes("\n") || value.includes('"')) return `"${value.replace(/"/g, '""')}"`;
          return value;
        }).join(",");
        lines.push(line);
      });

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `gp-link-admin-${state.tab}-${Date.now()}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      document.body.removeChild(anchor);
      URL.revokeObjectURL(url);
    }

    function openCandidateSnapshot(candidateId) {
      const list = state.dashboard ? state.dashboard.candidates : [];
      const candidate = list.find((item) => item.id === candidateId);
      if (!candidate) return;
      openCandidateModal(candidate);
    }

    function bindEvents() {
      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          state.tab = tab.getAttribute("data-tab");
          renderTabLabels();
          renderContent();
        });
      });

      searchInputEl.addEventListener("input", (event) => {
        state.query = event.target.value || "";
        renderContent();
      });

      document.getElementById("refreshBtn").addEventListener("click", () => {
        loadDashboard(true);
        loadZohoRecruitStatus(true);
      });

      document.getElementById("exportBtn").addEventListener("click", () => {
        exportCurrentTab();
      });
      logoutBtnEl.addEventListener("click", async () => {
        logoutBtnEl.disabled = true;
        try {
          await fetch("/api/admin/auth/logout", {
            method: "POST",
            credentials: "same-origin"
          });
        } catch (err) {
          // Continue redirecting on any error.
        } finally {
          window.location.href = "/pages/admin-signin.html";
        }
      });
      candidateModalCloseEl.addEventListener("click", () => {
        closeCandidateModal();
      });
      candidateModalEl.addEventListener("click", (event) => {
        if (event.target === candidateModalEl || event.target.closest("[data-close-modal]")) {
          closeCandidateModal();
          return;
        }
        const emailBtn = event.target.closest("[data-email-gp]");
        if (emailBtn) {
          const email = emailBtn.getAttribute("data-email-gp");
          if (email) window.location.href = `mailto:${email}`;
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && candidateModalEl.classList.contains("open")) {
          closeCandidateModal();
        }
      });

      contentEl.addEventListener("click", async (event) => {
        const viewBtn = event.target.closest("[data-view-candidate]");
        if (viewBtn) {
          openCandidateSnapshot(viewBtn.getAttribute("data-view-candidate"));
          return;
        }

        const replyBtn = event.target.closest("[data-reply-ticket]");
        if (replyBtn) {
          const ticketId = replyBtn.getAttribute("data-reply-ticket");
          const candidateEmail = replyBtn.getAttribute("data-candidate-email") || "";
          const candidateUserId = replyBtn.getAttribute("data-candidate-user-id") || "";
          const message = window.prompt("Send reply to candidate:");
          if (!message || !message.trim()) return;
          replyBtn.disabled = true;
          try {
            await updateTicket(ticketId, {
              adminReply: message.trim(),
              candidateEmail,
              candidateUserId
            });
            await loadDashboard();
          } catch (err) {
            window.alert(err.message);
          } finally {
            replyBtn.disabled = false;
          }
          return;
        }

        const toggleBtn = event.target.closest("[data-toggle-ticket]");
        if (toggleBtn) {
          const ticketId = toggleBtn.getAttribute("data-toggle-ticket");
          const status = toggleBtn.getAttribute("data-next-status");
          const candidateEmail = toggleBtn.getAttribute("data-candidate-email") || "";
          const candidateUserId = toggleBtn.getAttribute("data-candidate-user-id") || "";
          toggleBtn.disabled = true;
          try {
            await updateTicket(ticketId, { status, candidateEmail, candidateUserId });
            await loadDashboard();
          } catch (err) {
            window.alert(err.message);
          } finally {
            toggleBtn.disabled = false;
          }
        }
      });

      zohoRecruitPanelEl.addEventListener("click", (event) => {
        const connectBtn = event.target.closest("[data-zoho-connect]");
        if (connectBtn) {
          window.location.href = "/api/admin/integrations/zoho-recruit/connect";
          return;
        }
        const syncBtn = event.target.closest("[data-zoho-sync]");
        if (syncBtn) {
          triggerZohoRecruitSync();
        }
      });
    }

    function startAutoRefresh() {
      if (state.refreshTimer) clearInterval(state.refreshTimer);
      state.refreshTimer = setInterval(() => {
        if (document.visibilityState !== "visible") return;
        loadDashboard();
        loadZohoRecruitStatus();
      }, 15000);
    }

    bindEvents();
    loadDashboard();
    loadZohoRecruitStatus();
    startAutoRefresh();
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        loadDashboard();
        loadZohoRecruitStatus();
      }
    });
  </script>
</body>
</html>

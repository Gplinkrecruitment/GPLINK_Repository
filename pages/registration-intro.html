<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffffff" />
  <title>Registration Pathway - GP Link</title>
  <script src="/js/nav-shell-bridge.js?v=20260326a"></script>
  <script src="/js/auth-guard.js?v=20260311f" defer></script>
  <script src="/js/state-sync.js?v=20260314b" defer></script>
  <script src="/js/updates-sync.js?v=20260309c" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Manrope:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: #111111;
      background: #ffffff;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 28px 18px 40px;
    }

    .intro-page {
      width: min(100%, 440px);
      display: grid;
      gap: 0;
      justify-items: center;
    }

    .intro-copy {
      text-align: center;
      padding: 0 12px;
    }

    .intro-copy h1 {
      font-family: "Baloo 2", "Manrope", sans-serif;
      font-size: clamp(2.4rem, 10vw, 3.2rem);
      line-height: 0.92;
      letter-spacing: -0.03em;
      color: #111111;
    }

    .intro-lead {
      margin: 16px auto 0;
      max-width: 20ch;
      font-size: 1.15rem;
      line-height: 1.35;
      font-weight: 700;
      font-style: italic;
      color: #333333;
    }

    .hero-stage {
      position: relative;
      width: 100%;
      min-height: clamp(260px, 52vw, 360px);
      margin: 12px 0 0;
    }

    .flag-art {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(100%, 420px);
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 10px 20px rgba(20, 32, 69, 0.1));
      z-index: 1;
    }

    .kangaroo-art {
      position: absolute;
      left: 54%;
      bottom: 6px;
      width: min(48%, 200px);
      transform: translateX(-30%);
      filter: drop-shadow(0 6px 10px rgba(15, 23, 42, 0.12));
      z-index: 2;
    }

    .actions {
      width: min(100%, 320px);
      margin-top: 8px;
    }

    .start-btn {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 16px 18px;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      color: #ffffff;
      background: linear-gradient(180deg, #4a63e8 0%, #3152d9 100%);
      box-shadow: 0 14px 24px -14px rgba(49, 82, 217, 0.65);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
    }

    .start-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 28px -14px rgba(49, 82, 217, 0.75);
      background: linear-gradient(180deg, #5570f0 0%, #2644c0 100%);
    }

    .start-btn:active {
      transform: translateY(0);
    }

    .start-btn:disabled {
      cursor: wait;
      opacity: 0.78;
      transform: none;
    }

    @media (max-width: 420px) {
      body {
        padding: 20px 14px 32px;
      }

      .intro-copy h1 {
        font-size: clamp(2.2rem, 12vw, 2.8rem);
      }

      .intro-lead {
        font-size: 1.05rem;
      }

      .hero-stage {
        min-height: 240px;
      }
    }
  </style>
</head>
<body>
  <main class="intro-page">
    <header class="intro-copy">
      <h1 id="registrationIntroHeading">Specialist<br>Pathway</h1>
      <p class="intro-lead">Step by step guidance,<br>Tailored just for you.</p>
    </header>

    <div class="hero-stage" aria-hidden="true">
      <img
        class="flag-art"
        src="/media/images/registration-intro/specialist-pathway-flag.png"
        alt=""
        loading="eager"
        decoding="async"
      />
      <img
        class="kangaroo-art"
        src="/media/images/registration-intro/specialist-pathway-kangaroo.png"
        alt=""
        loading="eager"
        decoding="async"
      />
    </div>

    <div class="actions">
      <button class="start-btn" id="startRegistrationBtn" type="button">Get Started</button>
    </div>
  </main>

  <script>
    (function () {
      var INTRO_SEEN_KEY = "gp_registration_intro_seen";
      var INTRO_BYPASS_KEY = "gp_registration_intro_bypass_once";
      var SAVE_BATCH_META_SUFFIX = "__save_batch_meta";
      var RESET_KEYS = [
        "gp_epic_progress",
        "gp_amc_progress",
        "gp_ahpra_progress",
        "gp_epic_tutorial_seen",
        "gp_amc_tutorial_seen",
        "gp_ahpra_tutorial_seen"
      ];
      var TARGET_ROUTE = "/pages/myinthealth.html";
      var button = document.getElementById("startRegistrationBtn");

      function clearRegistrationProgress() {
        try {
          RESET_KEYS.forEach(function (key) {
            localStorage.removeItem(key);
            localStorage.removeItem(key + SAVE_BATCH_META_SUFFIX);
          });
        } catch (err) {}
      }

      function navigateToRegistration() {
        if (window.parent && window.parent !== window && typeof window.parent.gpShellNavigate === "function") {
          window.parent.gpShellNavigate(TARGET_ROUTE, { replace: true });
          return;
        }
        if (typeof window.gpShellNavigate === "function") {
          window.gpShellNavigate(TARGET_ROUTE, { replace: true });
          return;
        }
        window.location.assign(TARGET_ROUTE);
      }

      async function markSeenAndContinue() {
        if (!button) return;
        button.disabled = true;
        button.textContent = "Opening MyIntealth...";

        clearRegistrationProgress();

        try {
          localStorage.setItem(INTRO_SEEN_KEY, new Date().toISOString());
        } catch (err) {}

        try {
          sessionStorage.setItem(INTRO_BYPASS_KEY, "1");
        } catch (err) {}

        try {
          localStorage.setItem(INTRO_BYPASS_KEY, "1");
        } catch (err) {}

        try {
          if (window.gpLinkStateSync && typeof window.gpLinkStateSync.push === "function") {
            await window.gpLinkStateSync.push();
          }
        } catch (err) {}

        navigateToRegistration();
      }

      if (button) {
        button.addEventListener("click", function () {
          markSeenAndContinue();
        });
      }
    })();
  </script>
</body>
</html>

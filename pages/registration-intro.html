<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#142b63" />
  <title>Registration Pathway - GP Link</title>
  <script src="/js/nav-shell-bridge.js?v=20260326d"></script>
  <script src="/js/auth-guard.js?v=20260311f" defer></script>
  <script src="/js/state-sync.js?v=20260314b" defer></script>
  <script src="/js/updates-sync.js?v=20260309c" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.86);
      --button: #ffffff;
      --button-hover: #f4f7ff;
      --button-text: #17316d;
      --screen-gap: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: url("/media/images/gp%20link%20reg%20app%20bg.png") center top / cover no-repeat;
    }

    body {
      min-height: 100dvh;
      margin: 0;
      padding: 0;
    }

    .intro-shell {
      min-height: 100dvh;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 0 18px 34px;
    }

    .intro-card {
      width: min(100%, 420px);
      min-height: min(620px, calc(100dvh - 34px));
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 28px;
      padding: 52px 34px 34px;
      border-radius: 32px;
      background: transparent;
      border: 0;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .intro-body {
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 22px;
      width: 100%;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.72);
      text-align: center;
    }

    .copy {
      text-align: center;
      display: grid;
      gap: 16px;
      justify-items: center;
    }

    .copy h1 {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: clamp(3rem, 10vw, 4.4rem);
      line-height: 0.84;
      letter-spacing: -0.04em;
      max-width: 7ch;
      margin: 0 auto;
      text-wrap: balance;
    }

    .lead {
      max-width: 16ch;
      font-size: 1.24rem;
      line-height: 1.28;
      font-weight: 800;
      color: var(--muted);
      text-wrap: balance;
    }

    .actions {
      width: min(100%, 300px);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .start-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 17px 18px;
      font: inherit;
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--button-text);
      background: linear-gradient(180deg, #ffffff 0%, var(--button-hover) 100%);
      box-shadow:
        0 0 0 0 rgba(255, 255, 255, 0.52),
        0 18px 30px -18px rgba(9, 20, 46, 0.58);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      animation: scanPulse 1.9s ease-out infinite;
      will-change: transform, box-shadow;
    }

    .start-btn:hover {
      animation-play-state: paused;
      transform: translateY(-1px);
      background: linear-gradient(180deg, #ffffff 0%, #eef3ff 100%);
      box-shadow:
        0 0 0 10px rgba(255, 255, 255, 0.16),
        0 20px 32px -18px rgba(9, 20, 46, 0.62);
    }

    .start-btn:active {
      animation: none;
      transform: translateY(0) scale(0.99);
    }

    .start-btn:disabled {
      animation: none;
      cursor: wait;
      opacity: 0.82;
      transform: none;
    }

    @keyframes scanPulse {
      0% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(255, 255, 255, 0.52),
          0 18px 30px -18px rgba(9, 20, 46, 0.58);
      }
      65% {
        transform: scale(1.04);
        box-shadow:
          0 0 0 14px rgba(255, 255, 255, 0),
          0 20px 32px -18px rgba(9, 20, 46, 0.62);
      }
      100% {
        transform: scale(1);
        box-shadow:
          0 0 0 0 rgba(255, 255, 255, 0),
          0 18px 30px -18px rgba(9, 20, 46, 0.58);
      }
    }

    .action-note {
      margin: 0 auto;
      text-align: center;
      font-size: 0.82rem;
      line-height: 1.45;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.72);
      max-width: 28ch;
    }

    @media (max-width: 480px) {
      body {
        display: block;
        padding: 0;
      }

      .intro-shell {
        width: 100%;
        min-height: calc(100dvh - var(--gp-shell-bottom-clearance, 0px));
        padding: 0;
      }

      .intro-card {
        min-height: calc(100dvh - var(--gp-shell-bottom-clearance, 0px));
        align-content: stretch;
        justify-items: stretch;
        gap: 24px;
        padding:
          max(34px, calc(env(safe-area-inset-top, 0px) + 28px))
          22px
          calc(24px + env(safe-area-inset-bottom, 0px));
        border-radius: 0;
        border: 0;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: transparent;
      }

      .intro-body {
        align-content: center;
        align-self: center;
        justify-items: center;
        min-height: 100%;
      }

      .actions {
        width: min(100%, 320px);
      }

      .copy h1 {
        font-size: clamp(2.55rem, 12vw, 3.3rem);
      }

      .lead {
        font-size: 1.08rem;
      }
    }

    @media (min-width: 481px) {
      .intro-shell {
        padding-top: 0;
      }
    }
  </style>
</head>
<body>
  <main class="intro-shell">
    <section class="intro-card" aria-labelledby="registrationIntroHeading">
      <div class="intro-body">
        <p class="eyebrow">Registration Pathway</p>

        <header class="copy">
          <h1 id="registrationIntroHeading">Specialist Pathway</h1>
          <p class="lead">Step by step guidance, tailored just for you.</p>
        </header>
      </div>

      <div class="actions">
        <button class="start-btn" id="startRegistrationBtn" type="button">Get Started</button>
        <p class="action-note">We're here every step of the way.</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var INTRO_SEEN_KEY = "gp_registration_intro_seen";
      var INTRO_BYPASS_KEY = "gp_registration_intro_bypass_once";
      var TARGET_ROUTE = "/registration/myintealth/account";
      var button = document.getElementById("startRegistrationBtn");

      function navigateToRegistration() {
        if (window.parent && window.parent !== window && typeof window.parent.gpShellNavigate === "function") {
          window.parent.gpShellNavigate(TARGET_ROUTE, { replace: true });
          return;
        }
        if (typeof window.gpShellNavigate === "function") {
          window.gpShellNavigate(TARGET_ROUTE, { replace: true });
          return;
        }
        window.location.assign(TARGET_ROUTE);
      }

      function markSeenAndContinue() {
        if (!button) return;

        try {
          localStorage.setItem(INTRO_SEEN_KEY, new Date().toISOString());
        } catch (err) {}

        try {
          sessionStorage.setItem(INTRO_BYPASS_KEY, "1");
        } catch (err) {}

        try {
          localStorage.setItem(INTRO_BYPASS_KEY, "1");
        } catch (err) {}

        navigateToRegistration();
      }

      if (button) {
        button.addEventListener("click", function () {
          markSeenAndContinue();
        });
      }
    })();
  </script>
</body>
</html>
